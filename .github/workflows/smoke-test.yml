name: Smoke Test

on:
  push:
    branches: [main, arianafan2000]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run Python tests
        env:
          PYTHONPATH: src
          SECRET_KEY: ci-test-secret-key
        run: |
          pytest -q

      - name: Start server
        env:
          SECRET_KEY: ci-test-secret-key
          DEV_AUTO_LOGIN: "true"
          PYTHONPATH: src
        run: |
          python -m uvicorn petition_verifier.api:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health > /dev/null 2>&1 && echo "Server ready after ${i}s" && break
            sleep 1
          done

      - name: Run smoke tests
        run: |
          set -e

          # Health check
          curl -sf http://localhost:8000/health

          # Public auth endpoint
          curl -sf http://localhost:8000/auth/active-users

          # Login
          TOKEN=$(curl -sf -X POST http://localhost:8000/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"arianafan2000@app.local","password":"arianafan2000"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "Login OK"

          # Authenticated endpoints
          curl -sf http://localhost:8000/review/packets \
            -H "Authorization: Bearer $TOKEN"
          echo "Review packets OK"

          curl -sf http://localhost:8000/projects \
            -H "Authorization: Bearer $TOKEN"
          echo "Projects OK"

          echo "All smoke tests passed!"
