<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PetitionV">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <title>Sign In — Change Laws Now</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px env(safe-area-inset-bottom);
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 36px 24px 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 20px rgba(0,0,0,.08), 0 0 0 0.5px rgba(0,0,0,.06);
    }

    .logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #0a84ff, #0062cc);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 4px 12px rgba(10,132,255,.28);
    }
    .logo svg { width: 26px; height: 26px; fill: #fff; }

    h1 {
      font-size: 1.5rem; font-weight: 700; color: #000;
      text-align: center; letter-spacing: -.3px; margin-bottom: 4px;
    }
    .tagline {
      font-size: .875rem; color: #8e8e93;
      text-align: center; margin-bottom: 20px;
    }

    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-wrap input {
      width: 100%; padding: 11px 14px 11px 36px;
      border: 1px solid #e5e5ea; border-radius: 12px;
      font-size: .95rem; font-family: inherit;
      background: #f2f2f7; color: #000; outline: none;
      -webkit-appearance: none;
    }
    .search-wrap input::placeholder { color: #c7c7cc; }
    .search-wrap input:focus { border-color: #0a84ff; background: #fff; }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: #8e8e93; font-size: .9rem; pointer-events: none;
    }

    .name-list {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 52vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-right: 2px;
    }
    .name-list::-webkit-scrollbar { width: 4px; }
    .name-list::-webkit-scrollbar-track { background: transparent; }
    .name-list::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 4px; }

    .name-btn {
      width: 100%; padding: 13px 14px;
      background: #f2f2f7; border: none; border-radius: 12px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; font-family: inherit;
      transition: background .1s, transform .08s;
      -webkit-appearance: none; text-align: left;
    }
    .name-btn:hover  { background: #e8e8ed; }
    .name-btn:active { background: #d8d8dd; transform: scale(.98); }
    .name-btn.loading { opacity: .6; pointer-events: none; }

    .name-text { font-size: .97rem; font-weight: 600; color: #000; }

    .role-pill {
      font-size: .68rem; font-weight: 600; letter-spacing: .02em;
      padding: 3px 8px; border-radius: 20px; flex-shrink: 0;
      text-transform: uppercase;
    }
    .role-pill.petitioner    { background: #e8f4e8; color: #2e7d32; }
    .role-pill.field_manager { background: #e3f0ff; color: #0055b3; }
    .role-pill.worker        { background: #fff3e0; color: #e65100; }
    .role-pill.staff         { background: #f3e8ff; color: #6a1b9a; }

    .empty-state {
      padding: 28px 0; text-align: center;
      font-size: .875rem; color: #8e8e93;
    }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 16px 0 14px; color: #c7c7cc; font-size: .78rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #e5e5ea;
    }

    .form-group { margin-bottom: 10px; }
    .form-group input {
      width: 100%; padding: 13px 14px;
      border: 1px solid #e5e5ea; border-radius: 12px;
      font-size: .97rem; font-family: inherit;
      background: #fafafa; color: #000; outline: none;
      -webkit-appearance: none;
    }
    .form-group input::placeholder { color: #c7c7cc; }
    .form-group input:focus { border-color: #0a84ff; background: #fff; box-shadow: 0 0 0 3px rgba(10,132,255,.1); }

    .btn-login {
      width: 100%; padding: 13px;
      background: #0a84ff; color: #fff; border: none;
      border-radius: 12px; font-size: .97rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background .15s, opacity .15s;
      -webkit-appearance: none;
    }
    .btn-login:hover { background: #0077ed; }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }

    .error-msg {
      margin-top: 12px; padding: 11px 14px;
      background: #fff2f2; color: #ff3b30;
      border-radius: 10px; font-size: .84rem;
      display: none; text-align: center;
    }
    .error-msg.show { display: block; }

    .fm-toggle {
      margin-top: 18px; text-align: center;
      font-size: .8rem; color: #8e8e93; cursor: pointer;
    }
    .fm-toggle:hover { color: #0a84ff; }

    .fm-section { display: none; margin-top: 16px; }
    .fm-section.open { display: block; }
    .fm-section .fm-title {
      font-size: .82rem; font-weight: 600; color: #3c3c43;
      text-align: center; margin-bottom: 12px;
    }
    .fm-pw-wrap { position: relative; margin-bottom: 10px; }
    .fm-pw-wrap input {
      width: 100%; padding: 13px 14px;
      border: 1px solid #e5e5ea; border-radius: 12px;
      font-size: .97rem; font-family: inherit;
      background: #fafafa; color: #000; outline: none;
      -webkit-appearance: none;
    }
    .fm-pw-wrap input:focus { border-color: #0a84ff; background: #fff; box-shadow: 0 0 0 3px rgba(10,132,255,.1); }
    .fm-unlock-btn {
      width: 100%; padding: 13px;
      background: #5856d6; color: #fff; border: none;
      border-radius: 12px; font-size: .97rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background .15s, opacity .15s;
      -webkit-appearance: none;
    }
    .fm-unlock-btn:hover { background: #4846c0; }
    .fm-unlock-btn:disabled { opacity: .5; cursor: not-allowed; }
    .fm-error {
      margin-top: 10px; padding: 10px 14px;
      background: #fff2f2; color: #ff3b30;
      border-radius: 10px; font-size: .84rem;
      display: none; text-align: center;
    }
    .fm-error.show { display: block; }
    .fm-name-list {
      display: flex; flex-direction: column; gap: 6px; margin-top: 12px;
      max-height: 40vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <h1>Change Laws Now</h1>
    <p class="tagline">Tap your name to sign in</p>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchInput" placeholder="Search names…" autocomplete="off" oninput="filterNames()">
    </div>

    <div class="name-list" id="nameList">
      <div class="empty-state">Loading…</div>
    </div>

    <div class="divider"><span>or type your name</span></div>

    <form id="nameForm">
      <div class="form-group">
        <input type="text" id="nameInput" placeholder="Your full name" autocomplete="name">
      </div>
      <div class="form-group" id="scanPassGroup" style="display:none">
        <input type="password" id="scanPassInput" placeholder="" autocomplete="off">
      </div>
      <button type="submit" class="btn-login" id="nameBtn">Sign In</button>
    </form>

    <div class="error-msg" id="errorMsg"></div>

    <div class="fm-toggle" id="fmToggle" onclick="toggleFMSection()">Are you a Field Manager?</div>

    <div class="fm-section" id="fmSection">
      <div class="fm-title">Enter field manager team password</div>
      <div class="fm-pw-wrap">
        <input type="password" id="fmPwInput" placeholder="Team password" autocomplete="off"
               onkeydown="if(event.key==='Enter') unlockFM()">
      </div>
      <button class="fm-unlock-btn" id="fmUnlockBtn" onclick="unlockFM()">Unlock</button>
      <div class="fm-error" id="fmError"></div>
      <div class="fm-name-list" id="fmNameList"></div>
    </div>
  </div>

  <script>
    function redirect(role) {
      if (role === 'petitioner') {
        window.location.href = '/canvasser';
      } else if (role === 'field_manager' || role === 'evan') {
        window.location.href = '/field-manager';
      } else {
        window.location.href = '/static/dashboard.html';
      }
    }

    const existingToken = localStorage.getItem('pv_token');
    const existingRole  = localStorage.getItem('pv_role');
    if (existingToken && existingRole) redirect(existingRole);

    let allUsers = [];

    const rolePillClass = {
      'Petitioner':    'petitioner',
      'Field Manager': 'field_manager',
      'Worker':        'worker',
      'Staff':         'staff',
    };

    async function loadNames() {
      const el = document.getElementById('nameList');
      // Show "waking up" message if server takes > 3s (Render free tier cold start)
      const wakeTimer = setTimeout(() => {
        el.innerHTML = '<div class="empty-state">Server is waking up, please wait…</div>';
      }, 3000);
      try {
        const res = await fetch('/auth/active-users');
        clearTimeout(wakeTimer);
        allUsers = await res.json();
        renderNames(allUsers);
      } catch(e) {
        clearTimeout(wakeTimer);
        el.innerHTML = '<div class="empty-state">Could not load names — try refreshing</div>';
      }
    }

    function filterNames() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      renderNames(q ? allUsers.filter(u => u.full_name.toLowerCase().includes(q)) : allUsers);
    }

    function renderNames(users) {
      const el = document.getElementById('nameList');
      if (!users.length) {
        el.innerHTML = '<div class="empty-state">No matches</div>';
        return;
      }
      el.innerHTML = users.map(u => {
        const cls = rolePillClass[u.role_label] || 'staff';
        const safeName = u.full_name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
        return `<button class="name-btn" data-name="${safeName}">
          <span class="name-text">${u.full_name}</span>
          <span class="role-pill ${cls}">${u.role_label}</span>
        </button>`;
      }).join('');
      el.querySelectorAll('.name-btn').forEach(btn => {
        btn.addEventListener('click', () => loginAs(btn, btn.dataset.name));
      });
    }

    async function loginAs(btn, name) {
      const errorEl = document.getElementById('errorMsg');
      errorEl.classList.remove('show');
      btn.classList.add('loading');
      btn.querySelector('.name-text').textContent = 'Signing in…';

      try {
        const res  = await fetch('/auth/login-by-name', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name: name }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');

        localStorage.setItem('pv_token',     data.access_token);
        localStorage.setItem('pv_role',      data.role);
        localStorage.setItem('pv_user_id',   data.user_id);
        localStorage.setItem('pv_full_name', data.full_name);

        redirect(data.role);
      } catch(err) {
        btn.classList.remove('loading');
        btn.querySelector('.name-text').textContent = name;
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
      }
    }

    async function attemptLogin(input) {
      // Try name-based login first
      const r1 = await fetch('/auth/login-by-name', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_name: input }),
      });
      if (r1.ok) return await r1.json();

      // Fall back to username login (e.g. arianafan2000 → arianafan2000@app.local)
      const r2 = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: input + '@app.local', password: input }),
      });
      const d2 = await r2.json();
      if (!r2.ok) throw new Error('Name or username not found');
      return d2;
    }

    document.getElementById('nameForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('nameInput').value.trim();
      if (!input) return;
      const btn = document.getElementById('nameBtn');
      const errorEl = document.getElementById('errorMsg');
      errorEl.classList.remove('show');

      // Secret scanner login
      if (input.toLowerCase() === 'shhh') {
        const group = document.getElementById('scanPassGroup');
        if (group.style.display === 'none') {
          group.style.display = '';
          document.getElementById('scanPassInput').focus();
          return;
        }
        const pass = document.getElementById('scanPassInput').value;
        btn.disabled = true; btn.textContent = 'Signing in…';
        try {
          const res = await fetch('/auth/scan-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pass }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Wrong password');
          localStorage.setItem('pv_token',     data.access_token);
          localStorage.setItem('pv_role',      data.role);
          localStorage.setItem('pv_user_id',   data.user_id);
          localStorage.setItem('pv_full_name', data.full_name);
          window.location.href = '/static/dashboard.html#review';
        } catch(err) {
          errorEl.textContent = err.message;
          errorEl.classList.add('show');
          btn.disabled = false; btn.textContent = 'Sign In';
        }
        return;
      }

      document.getElementById('scanPassGroup').style.display = 'none';
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const data = await attemptLogin(input);
        localStorage.setItem('pv_token',     data.access_token);
        localStorage.setItem('pv_role',      data.role);
        localStorage.setItem('pv_user_id',   data.user_id);
        localStorage.setItem('pv_full_name', data.full_name);
        redirect(data.role);
      } catch(err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    });

    function toggleFMSection() {
      const sec = document.getElementById('fmSection');
      const tog = document.getElementById('fmToggle');
      const isOpen = sec.classList.toggle('open');
      tog.textContent = isOpen ? 'Hide Field Manager login' : 'Are you a Field Manager?';
      if (isOpen) setTimeout(() => document.getElementById('fmPwInput').focus(), 80);
    }

    async function unlockFM() {
      const pw  = document.getElementById('fmPwInput').value;
      const err = document.getElementById('fmError');
      const btn = document.getElementById('fmUnlockBtn');
      const list = document.getElementById('fmNameList');
      err.classList.remove('show');
      if (!pw) return;
      btn.disabled = true; btn.textContent = 'Checking…';
      try {
        const res  = await fetch('/auth/fm-users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Wrong password');
        list.innerHTML = data.map(u => {
          const safeName = u.full_name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
          return `<button class="name-btn" data-name="${safeName}">
            <span class="name-text">${u.full_name}</span>
            <span class="role-pill field_manager">Field Manager</span>
          </button>`;
        }).join('') || '<div style="text-align:center;padding:16px;font-size:.85rem;color:#8e8e93">No field managers found</div>';
        list.querySelectorAll('.name-btn').forEach(b =>
          b.addEventListener('click', () => loginAs(b, b.dataset.name))
        );
      } catch(e) {
        err.textContent = e.message;
        err.classList.add('show');
      }
      btn.disabled = false; btn.textContent = 'Unlock';
    }

    loadNames();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
