<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PetitionV">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <title>Sign In — Petition Verifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px env(safe-area-inset-bottom);
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 36px 24px 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 20px rgba(0,0,0,.08), 0 0 0 0.5px rgba(0,0,0,.06);
    }

    .logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #0a84ff, #0062cc);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 4px 12px rgba(10,132,255,.28);
    }
    .logo svg { width: 26px; height: 26px; fill: #fff; }

    h1 {
      font-size: 1.5rem; font-weight: 700; color: #000;
      text-align: center; letter-spacing: -.3px; margin-bottom: 4px;
    }
    .tagline {
      font-size: .875rem; color: #8e8e93;
      text-align: center; margin-bottom: 20px;
    }

    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-wrap input {
      width: 100%; padding: 11px 14px 11px 36px;
      border: 1px solid #e5e5ea; border-radius: 12px;
      font-size: .95rem; font-family: inherit;
      background: #f2f2f7; color: #000; outline: none;
      -webkit-appearance: none;
    }
    .search-wrap input::placeholder { color: #c7c7cc; }
    .search-wrap input:focus { border-color: #0a84ff; background: #fff; }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: #8e8e93; font-size: .9rem; pointer-events: none;
    }

    .name-list {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 52vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-right: 2px;
    }
    .name-list::-webkit-scrollbar { width: 4px; }
    .name-list::-webkit-scrollbar-track { background: transparent; }
    .name-list::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 4px; }

    .name-btn {
      width: 100%; padding: 13px 14px;
      background: #f2f2f7; border: none; border-radius: 12px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; font-family: inherit;
      transition: background .1s, transform .08s;
      -webkit-appearance: none; text-align: left;
    }
    .name-btn:hover  { background: #e8e8ed; }
    .name-btn:active { background: #d8d8dd; transform: scale(.98); }
    .name-btn.loading { opacity: .6; pointer-events: none; }

    .name-text { font-size: .97rem; font-weight: 600; color: #000; }

    .role-pill {
      font-size: .68rem; font-weight: 600; letter-spacing: .02em;
      padding: 3px 8px; border-radius: 20px; flex-shrink: 0;
      text-transform: uppercase;
    }
    .role-pill.petitioner    { background: #e8f4e8; color: #2e7d32; }
    .role-pill.field_manager { background: #e3f0ff; color: #0055b3; }
    .role-pill.worker        { background: #fff3e0; color: #e65100; }
    .role-pill.staff         { background: #f3e8ff; color: #6a1b9a; }

    .empty-state {
      padding: 28px 0; text-align: center;
      font-size: .875rem; color: #8e8e93;
    }

    .error-msg {
      margin-top: 14px; padding: 11px 14px;
      background: #fff2f2; color: #ff3b30;
      border-radius: 10px; font-size: .84rem;
      display: none; text-align: center;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <h1>Petition Verifier</h1>
    <p class="tagline">Tap your name to sign in</p>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchInput" placeholder="Search names…" autocomplete="off" oninput="filterNames()">
    </div>

    <div class="name-list" id="nameList">
      <div class="empty-state">Loading…</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script>
    function redirect(role) {
      if (role === 'petitioner') {
        window.location.href = '/canvasser';
      } else if (role === 'field_manager' || role === 'evan') {
        window.location.href = '/field-manager';
      } else {
        window.location.href = '/static/dashboard.html';
      }
    }

    const existingToken = localStorage.getItem('pv_token');
    const existingRole  = localStorage.getItem('pv_role');
    if (existingToken && existingRole) redirect(existingRole);

    let allUsers = [];

    const rolePillClass = {
      'Petitioner':    'petitioner',
      'Field Manager': 'field_manager',
      'Worker':        'worker',
      'Staff':         'staff',
    };

    async function loadNames() {
      try {
        const res = await fetch('/auth/active-users');
        allUsers = await res.json();
        renderNames(allUsers);
      } catch(e) {
        document.getElementById('nameList').innerHTML =
          '<div class="empty-state">Could not load names — try refreshing</div>';
      }
    }

    function filterNames() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      renderNames(q ? allUsers.filter(u => u.full_name.toLowerCase().includes(q)) : allUsers);
    }

    function renderNames(users) {
      const el = document.getElementById('nameList');
      if (!users.length) {
        el.innerHTML = '<div class="empty-state">No matches</div>';
        return;
      }
      el.innerHTML = users.map(u => {
        const cls = rolePillClass[u.role_label] || 'staff';
        return `<button class="name-btn" onclick="loginAs(this, ${JSON.stringify(u.full_name)})">
          <span class="name-text">${u.full_name}</span>
          <span class="role-pill ${cls}">${u.role_label}</span>
        </button>`;
      }).join('');
    }

    async function loginAs(btn, name) {
      const errorEl = document.getElementById('errorMsg');
      errorEl.classList.remove('show');
      btn.classList.add('loading');
      btn.querySelector('.name-text').textContent = 'Signing in…';

      try {
        const res  = await fetch('/auth/login-by-name', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name: name }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');

        localStorage.setItem('pv_token',     data.access_token);
        localStorage.setItem('pv_role',      data.role);
        localStorage.setItem('pv_user_id',   data.user_id);
        localStorage.setItem('pv_full_name', data.full_name);

        redirect(data.role);
      } catch(err) {
        btn.classList.remove('loading');
        btn.querySelector('.name-text').textContent = name;
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
      }
    }

    loadNames();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
