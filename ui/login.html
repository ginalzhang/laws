<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PetitionV">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <title>Sign In — Petition Verifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 20px rgba(0,0,0,.08), 0 0 0 0.5px rgba(0,0,0,.06);
    }

    .logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #0a84ff, #0062cc);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 4px 12px rgba(10,132,255,.3);
    }
    .logo svg { width: 28px; height: 28px; fill: #fff; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #000;
      text-align: center;
      letter-spacing: -.3px;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: .875rem;
      color: #8e8e93;
      text-align: center;
      margin-bottom: 36px;
    }

    .form-group { margin-bottom: 12px; }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #e5e5ea;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      background: #fafafa;
      color: #000;
      transition: border-color .15s, box-shadow .15s, background .15s;
      outline: none;
      -webkit-appearance: none;
    }
    .form-group input::placeholder { color: #c7c7cc; }
    .form-group input:focus {
      border-color: #0a84ff;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(10,132,255,.12);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #0a84ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s, transform .1s, opacity .15s;
      -webkit-appearance: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover { background: #0077ed; }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .error-msg {
      margin-top: 14px;
      padding: 12px 14px;
      background: #fff2f2;
      color: #ff3b30;
      border-radius: 10px;
      font-size: .85rem;
      display: none;
      text-align: center;
    }
    .error-msg.show { display: block; }

    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <h1>Petition Verifier</h1>
    <p class="tagline">Type your name to sign in</p>

    <form id="nameForm">
      <div class="form-group">
        <input type="text" id="nameInput" placeholder="Your full name" required autocomplete="name" autofocus>
      </div>
      <button type="submit" class="btn-login" id="nameBtn">Sign In</button>
      <div class="error-msg" id="nameError"></div>
    </form>
  </div>

  <script>
    function redirect(role) {
      if (role === 'petitioner') {
        window.location.href = '/canvasser';
      } else if (role === 'field_manager') {
        window.location.href = '/field-manager';
      } else {
        window.location.href = '/static/dashboard.html';
      }
    }

    const existingToken = localStorage.getItem('pv_token');
    const existingRole  = localStorage.getItem('pv_role');
    if (existingToken && existingRole) redirect(existingRole);

    document.getElementById('nameForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn     = document.getElementById('nameBtn');
      const errorEl = document.getElementById('nameError');
      const name    = document.getElementById('nameInput').value.trim();

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>Signing in…';
      errorEl.classList.remove('show');

      try {
        const res  = await fetch('/auth/login-by-name', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name: name }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');

        localStorage.setItem('pv_token',     data.access_token);
        localStorage.setItem('pv_role',      data.role);
        localStorage.setItem('pv_user_id',   data.user_id);
        localStorage.setItem('pv_full_name', data.full_name);

        redirect(data.role);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
        btn.disabled  = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
