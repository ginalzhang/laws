<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f2f2f7">
  <title>Field Manager</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: #f2f2f7;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      background: #fff;
      padding: 20px 20px 14px;
      border-bottom: 0.5px solid #e5e5ea;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 1.2rem; font-weight: 700; }
    .header-sub   { font-size: .8rem; color: #8e8e93; margin-top: 2px; }
    .refresh-btn {
      padding: 8px 16px; border: 1.5px solid #e5e5ea; border-radius: 10px;
      background: #fff; font-size: .85rem; font-weight: 600; font-family: inherit;
      cursor: pointer; color: #0a84ff;
    }
    .refresh-btn:active { background: #f2f2f7; }

    .content { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    /* Action buttons row */
    .action-row { display: flex; gap: 10px; }
    .action-btn {
      flex: 1; padding: 14px 10px;
      border: none; border-radius: 14px;
      font-size: .9rem; font-weight: 700; font-family: inherit;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 5px;
      transition: opacity .15s, transform .1s;
      -webkit-appearance: none;
    }
    .action-btn:active  { transform: scale(.96); opacity: .85; }
    .action-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .action-btn .icon   { font-size: 1.4rem; }
    .action-btn .label  { font-size: .78rem; font-weight: 600; }
    .action-btn .sub    { font-size: .68rem; font-weight: 400; opacity: .75; }
    .btn-blue  { background: #0a84ff; color: #fff; }
    .btn-green { background: #30d158; color: #fff; }
    .btn-red   { background: #ff3b30; color: #fff; }

    .msg {
      font-size: .82rem; text-align: center; min-height: 16px;
      color: #8e8e93;
    }
    .msg.success { color: #2e7d32; }
    .msg.error   { color: #c62828; }

    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 0 0 0.5px rgba(0,0,0,.04);
      overflow: hidden;
    }
    .card-title {
      font-size: .9rem; font-weight: 700; color: #000;
      padding: 14px 16px 0;
    }

    #mapContainer { height: 320px; }

    .pins-list { padding: 0 16px 8px; }
    .pin-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0; border-bottom: 0.5px solid #f2f2f7;
    }
    .pin-row:last-child { border-bottom: none; }
    .pin-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .pin-name { font-weight: 600; font-size: .875rem; }
    .pin-time { color: #8e8e93; font-size: .75rem; margin-left: 6px; }
    .pin-coords { font-size: .72rem; color: #8e8e93; text-align: right; flex-shrink: 0; }

    .leaderboard-list { padding: 0 16px 8px; }
    .lb-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 0.5px solid #f2f2f7;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank { font-size: .8rem; color: #8e8e93; width: 20px; flex-shrink: 0; text-align: center; }
    .lb-name { flex: 1; font-size: .9rem; font-weight: 600; }
    .lb-sigs { font-size: .9rem; font-weight: 700; color: #0a84ff; }
    .lb-rate { font-size: .75rem; color: #8e8e93; margin-left: 4px; }

    .empty { padding: 20px; text-align: center; color: #8e8e93; font-size: .85rem; }

    /* Schedule grid */
    .week-nav { display: flex; align-items: center; gap: 10px; padding: 12px 16px 8px; }
    .week-label { flex: 1; font-size: .85rem; font-weight: 700; text-align: center; }
    .nav-btn {
      padding: 6px 12px; border: 1.5px solid #e5e5ea; border-radius: 8px;
      background: #fff; font-size: .82rem; font-weight: 600; color: #0a84ff;
      cursor: pointer; font-family: inherit;
    }
    .nav-btn:active { background: #f2f2f7; }
    .week-grid { display: grid; }
    .wg-header { background: #f2f2f7; padding: 7px 8px; font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: #8e8e93; text-align: center; }
    .wg-worker { background: #fafafa; padding: 8px 10px; font-size: .82rem; font-weight: 600; color: #1c1c1e; }
    .wg-cell { background: #fff; padding: 5px; min-height: 44px; }
    .wg-shift { background: rgba(48,209,88,.15); color: #248a3d; border-radius: 6px; padding: 3px 6px; font-size: .68rem; font-weight: 600; cursor: pointer; display: block; margin-bottom: 2px; }

    /* Modals */
    .fm-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; z-index: 1100;
    }
    .fm-modal-overlay.open { display: flex; }
    .fm-modal {
      background: #fff; border-radius: 20px; padding: 24px 22px;
      width: 92%; max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .fm-modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
    .fm-modal-close { float: right; cursor: pointer; color: #8e8e93; font-size: 1rem;
      width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%; background: #f2f2f7; margin-top: -2px; }
    .fm-form-group { margin-bottom: 14px; }
    .fm-form-group label { display: block; font-size: .75rem; font-weight: 600; color: #6e6e73; margin-bottom: 4px; }
    .fm-form-group input {
      width: 100%; padding: 10px 12px; border: 1.5px solid #e5e5ea; border-radius: 10px;
      font-size: .9rem; font-family: inherit; background: #f9f9fb; outline: none; color: #1c1c1e;
    }
    .fm-form-group input:focus { border-color: #0a84ff; background: #fff; }
    .fm-modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .fm-btn {
      padding: 9px 18px; border: none; border-radius: 10px; cursor: pointer;
      font-size: .875rem; font-weight: 600; font-family: inherit;
    }
    .fm-btn-outline { background: rgba(10,132,255,.1); color: #0a84ff; }
    .fm-btn-primary { background: #0a84ff; color: #fff; }
    .fm-btn-danger  { background: #ff3b30; color: #fff; }
    .fm-modal-err { color: #c62828; font-size: .8rem; margin-bottom: 8px; display: none; }

    .logout-link {
      text-align: center; padding: 8px;
      font-size: .8rem; color: #8e8e93; cursor: pointer;
    }
    .logout-link:hover { color: #ff3b30; }

    /* Sig count sheet — z-index must beat Leaflet's 700 */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
      align-items: flex-end; justify-content: center; z-index: 1000;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: #fff; border-radius: 22px 22px 0 0;
      padding: 28px 24px calc(28px + env(safe-area-inset-bottom));
      width: 100%; max-width: 480px;
    }
    .sheet h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .sheet .current-label { font-size: .85rem; color: #8e8e93; margin-bottom: 16px; }
    .sheet input[type=number] {
      width: 100%; padding: 16px; border: 1.5px solid #e5e5ea; border-radius: 14px;
      font-size: 2rem; font-weight: 700; font-family: inherit;
      text-align: center; outline: none; background: #f9f9fb;
      -webkit-appearance: none; appearance: none;
    }
    .sheet input[type=number]:focus { border-color: #0a84ff; background: #fff; }
    .sheet-btns { display: flex; gap: 12px; margin-top: 16px; }
    .sheet-btns button {
      flex: 1; padding: 14px; border: none; border-radius: 14px;
      font-size: 1rem; font-weight: 600; font-family: inherit; cursor: pointer;
    }
    .btn-cancel { background: #f2f2f7; color: #000; }
    .btn-submit { background: #0a84ff; color: #fff; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* Mode picker step */
    .mode-step { display: none; }
    .mode-step.active { display: block; }
    .input-step.hidden { display: none; }

    .mode-info {
      background: #f2f2f7; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 16px;
      font-size: .9rem; color: #3a3a3c; line-height: 1.5;
    }
    .mode-info strong { color: #000; }
    .mode-btns { display: flex; flex-direction: column; gap: 10px; }
    .mode-btn {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      font-size: 1rem; font-weight: 600; font-family: inherit; cursor: pointer;
      text-align: left; transition: opacity .15s, transform .1s;
    }
    .mode-btn:active { transform: scale(.98); opacity: .88; }
    .mode-btn .sub { font-size: .8rem; font-weight: 400; opacity: .7; display: block; margin-top: 2px; }
    .mode-btn.add     { background: #30d158; color: #fff; }
    .mode-btn.replace { background: #f2f2f7; color: #000; }
    .mode-btn.back    { background: none; color: #0a84ff; font-size: .9rem; text-align: center; padding: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title" id="managerName">Field Manager</div>
      <div class="header-sub" id="lastRefresh">Loading…</div>
    </div>
    <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
  </div>

  <div class="content">

    <!-- Quick actions -->
    <div class="action-row">
      <button class="action-btn btn-blue" id="sigBtn" onclick="openSigSheet()">
        <span class="icon">✍️</span>
        <span class="label">Submit Sigs</span>
        <span class="sub" id="mySigCount">Tap to update</span>
      </button>
      <button class="action-btn btn-green" id="locBtn" onclick="shareLocation()">
        <span class="icon">📍</span>
        <span class="label">Drop Pin</span>
        <span class="sub">Share my location</span>
      </button>
      <button class="action-btn btn-red" id="clearPinBtn" onclick="clearPin()">
        <span class="icon">🗑️</span>
        <span class="label">Remove Pin</span>
        <span class="sub">Delete my location</span>
      </button>
    </div>
    <div class="msg" id="statusMsg"></div>

    <!-- Map -->
    <div class="card">
      <div class="card-title" style="padding-bottom:10px">Live Map</div>
      <div id="mapContainer"></div>
    </div>

    <!-- Recent pins list -->
    <div class="card">
      <div class="card-title">Recent Location Pins</div>
      <div class="pins-list" id="pinsList"><div class="empty">Loading…</div></div>
    </div>

    <!-- Sig counts leaderboard -->
    <div class="card">
      <div class="card-title">Live Signature Counts</div>
      <div class="leaderboard-list" id="lbList"><div class="empty">Loading…</div></div>
    </div>

    <!-- Weekly schedule -->
    <div class="card" style="overflow:visible">
      <div class="week-nav">
        <button class="nav-btn" onclick="prevWeek()">← Prev</button>
        <div class="week-label" id="fmWeekLabel"></div>
        <button class="nav-btn" onclick="nextWeek()">Next →</button>
      </div>
      <div id="fmScheduleGrid" style="overflow-x:auto;padding-bottom:8px"></div>
    </div>

    <div class="logout-link" onclick="logout()">Sign out</div>
  </div>

  <!-- Add Shift Modal -->
  <div class="fm-modal-overlay" id="fmAddShiftModal">
    <div class="fm-modal">
      <span class="fm-modal-close" onclick="closeFMModal('fmAddShiftModal')">✕</span>
      <div class="fm-modal-title" id="fmAddShiftTitle">Add Shift</div>
      <input type="hidden" id="fmAddShiftWorkerId">
      <input type="hidden" id="fmAddShiftDate">
      <div class="fm-form-group">
        <label>Start Time</label>
        <input type="time" id="fmAddShiftStart" value="09:00">
      </div>
      <p style="font-size:.78rem;color:#8e8e93;margin:0 0 12px">End time is open — clock out when done.</p>
      <div class="fm-modal-err" id="fmAddShiftErr"></div>
      <div class="fm-modal-footer">
        <button class="fm-btn fm-btn-outline" onclick="closeFMModal('fmAddShiftModal')">Cancel</button>
        <button class="fm-btn fm-btn-primary" onclick="submitFMAddShift()">Add Shift</button>
      </div>
    </div>
  </div>

  <!-- Edit Shift Modal -->
  <div class="fm-modal-overlay" id="fmEditShiftModal">
    <div class="fm-modal">
      <span class="fm-modal-close" onclick="closeFMModal('fmEditShiftModal')">✕</span>
      <div class="fm-modal-title" id="fmEditShiftTitle">Edit Shift</div>
      <input type="hidden" id="fmEditShiftId">
      <div class="fm-form-group">
        <label>Start Time</label>
        <input type="time" id="fmEditShiftStart">
      </div>
      <div class="fm-form-group">
        <label>End Time <span style="font-weight:400;color:#8e8e93">(leave blank if still active)</span></label>
        <input type="time" id="fmEditShiftEnd">
      </div>
      <div class="fm-modal-err" id="fmEditShiftErr"></div>
      <div class="fm-modal-footer" style="justify-content:space-between">
        <button class="fm-btn fm-btn-danger" onclick="removeFMShift()">Remove</button>
        <div style="display:flex;gap:8px">
          <button class="fm-btn fm-btn-outline" onclick="closeFMModal('fmEditShiftModal')">Cancel</button>
          <button class="fm-btn fm-btn-primary" onclick="submitFMEditShift()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sig count sheet -->
  <div class="overlay" id="sigOverlay">
    <div class="sheet">
      <!-- Step 1: enter number -->
      <div class="input-step" id="inputStep">
        <h2 id="sheetTitle">How many signatures?</h2>
        <div class="current-label" id="currentLabel"></div>
        <input type="number" id="sigInput" min="0" max="9999" placeholder="0">
        <div class="sheet-btns">
          <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
          <button class="btn-submit" id="sigSubmitBtn" onclick="goToModeStep()">Next</button>
        </div>
      </div>
      <!-- Step 2: replace or add? -->
      <div class="mode-step" id="modeStep">
        <h2>What do you want to do?</h2>
        <div class="mode-info" id="modeInfo"></div>
        <div class="mode-btns">
          <button class="mode-btn add" onclick="submitSigCount('add')">
            Add to my total
            <span class="sub" id="addSub"></span>
          </button>
          <button class="mode-btn replace" onclick="submitSigCount('replace')">
            Replace — I typed the wrong number
            <span class="sub" id="replaceSub"></span>
          </button>
          <button class="mode-btn back" onclick="goBackToInput()">← Edit number</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token    = localStorage.getItem('pv_token');
    const userName = localStorage.getItem('pv_full_name');
    if (!token) { window.location.href = '/'; }
    document.getElementById('managerName').textContent = userName || 'Field Manager';

    let currentCount = 0;
    const storedCount = sessionStorage.getItem('pv_sig_count');
    if (storedCount) { currentCount = parseInt(storedCount,10)||0; document.getElementById('mySigCount').textContent = storedCount + ' sigs today'; }

    async function initMyCount() {
      try {
        const data = await fetch('/stats/my-count', {
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }
        }).then(r => r.json());
        if (data.sig_count > 0) {
          currentCount = data.sig_count;
          sessionStorage.setItem('pv_sig_count', data.sig_count);
          document.getElementById('mySigCount').textContent = data.sig_count + ' sigs today';
        }
      } catch(e) {}
    }
    initMyCount();

    function api(path, opts = {}) {
      return fetch(path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...(opts.headers || {}) },
      }).then(async r => {
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Request failed');
        return d;
      });
    }

    function setMsg(text, type = '') {
      const el = document.getElementById('statusMsg');
      el.textContent = text;
      el.className = 'msg' + (type ? ' ' + type : '');
      if (type) setTimeout(() => { el.textContent = ''; el.className = 'msg'; }, 3000);
    }

    // ── Sig count ─────────────────────────────────────────────────────────────
    function openSigSheet() {
      document.getElementById('inputStep').classList.remove('hidden');
      document.getElementById('modeStep').classList.remove('active');
      document.getElementById('sheetTitle').textContent = currentCount > 0 ? 'Update sig count' : 'How many signatures?';
      document.getElementById('currentLabel').textContent = currentCount > 0 ? `Your current count: ${currentCount}` : '';
      document.getElementById('sigInput').value = '';
      document.getElementById('sigOverlay').classList.add('open');
      setTimeout(() => document.getElementById('sigInput').focus(), 80);
    }

    function closeSheet() {
      document.getElementById('sigOverlay').classList.remove('open');
    }

    function goToModeStep() {
      const val = parseInt(document.getElementById('sigInput').value, 10);
      if (isNaN(val) || val < 0) { setMsg('Enter a valid number', 'error'); return; }
      if (currentCount <= 0) { submitSigCount('replace'); return; }
      const newTotal = currentCount + val;
      document.getElementById('modeInfo').innerHTML = `You entered <strong>${val}</strong>. Your current total is <strong>${currentCount}</strong>.`;
      document.getElementById('addSub').textContent = `${currentCount} + ${val} = ${newTotal} total`;
      document.getElementById('replaceSub').textContent = `New total: ${val}`;
      document.getElementById('inputStep').classList.add('hidden');
      document.getElementById('modeStep').classList.add('active');
    }

    function goBackToInput() {
      document.getElementById('modeStep').classList.remove('active');
      document.getElementById('inputStep').classList.remove('hidden');
      setTimeout(() => document.getElementById('sigInput').focus(), 80);
    }

    async function submitSigCount(mode) {
      const val = parseInt(document.getElementById('sigInput').value, 10);
      if (isNaN(val) || val < 0) { setMsg('Enter a valid number', 'error'); closeSheet(); return; }
      const finalCount = mode === 'add' ? currentCount + val : val;
      document.querySelectorAll('.mode-btn').forEach(b => b.disabled = true);
      document.getElementById('sigSubmitBtn').disabled = true;
      try {
        await api('/stats/sig-count', { method: 'POST', body: JSON.stringify({ count: finalCount }) });
        currentCount = finalCount;
        sessionStorage.setItem('pv_sig_count', finalCount);
        document.getElementById('mySigCount').textContent = finalCount + ' sigs today';
        closeSheet();
        setMsg('Sig count updated!', 'success');
        loadLeaderboard();
      } catch(e) { setMsg(e.message, 'error'); closeSheet(); }
      document.querySelectorAll('.mode-btn').forEach(b => b.disabled = false);
      document.getElementById('sigSubmitBtn').disabled = false;
    }

    document.getElementById('sigOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeSheet();
    });

    // ── Location ──────────────────────────────────────────────────────────────
    async function clearPin() {
      const btn = document.getElementById('clearPinBtn');
      btn.disabled = true;
      try {
        await api('/stats/location', { method: 'DELETE' });
        setMsg('Pin removed!', 'success');
        refresh();
      } catch(e) { setMsg(e.message, 'error'); }
      btn.disabled = false;
    }

    async function shareLocation() {
      if (!navigator.geolocation) { setMsg('Geolocation not supported', 'error'); return; }
      const btn = document.getElementById('locBtn');
      btn.disabled = true;
      setMsg('Getting location…');
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          try {
            await api('/stats/location', {
              method: 'POST',
              body: JSON.stringify({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
            });
            setMsg('Pin dropped!', 'success');
            const [pins] = await Promise.all([api('/locations/pins'), loadLeaderboard()]);
            await loadMap(pins);
          } catch(e) { setMsg(e.message, 'error'); }
          btn.disabled = false;
        },
        (err) => {
          setMsg(err.code === 1 ? 'Location access denied — allow it in browser settings' : 'Could not get location', 'error');
          btn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    // ── Map ───────────────────────────────────────────────────────────────────
    let _leafletMap = null;
    const _workerColors = ['#0a84ff','#30d158','#ff9f0a','#bf5af2','#ff375f','#64d2ff','#ffd60a','#ff6961'];
    const _colorFor = (() => { const m = {}; let i = 0; return id => (m[id] = m[id] ?? _workerColors[i++ % _workerColors.length]); })();

    async function loadMap(pins) {
      const listEl = document.getElementById('pinsList');
      if (!pins.length) {
        listEl.innerHTML = '<div class="empty">No pins yet</div>';
      } else {
        listEl.innerHTML = pins.slice(0, 30).map(p => {
          const t   = new Date(p.pinned_at + 'Z').toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
          const d   = new Date(p.pinned_at + 'Z').toLocaleDateString([], {month:'short', day:'numeric'});
          const col = _colorFor(p.worker_id);
          return `<div class="pin-row">
            <div class="pin-dot" style="background:${col}"></div>
            <div style="flex:1">
              <span class="pin-name">${p.worker_name}</span>
              <span class="pin-time">${d} ${t}</span>
              ${p.note ? `<div style="font-size:.78rem;color:#6e6e73;margin-top:2px">${p.note}</div>` : ''}
            </div>
            <div class="pin-coords">${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}</div>
          </div>`;
        }).join('');
      }

      if (!_leafletMap) {
        _leafletMap = L.map('mapContainer').setView([37.7749, -122.4194], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap contributors', maxZoom: 19,
        }).addTo(_leafletMap);
      } else {
        _leafletMap.eachLayer(l => { if (l instanceof L.Marker) _leafletMap.removeLayer(l); });
      }

      if (pins.length) {
        const latlngs = [];
        pins.forEach(p => {
          const col  = _colorFor(p.worker_id);
          const icon = L.divIcon({
            html: `<div style="width:14px;height:14px;border-radius:50%;background:${col};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
            className: '', iconSize: [14,14], iconAnchor: [7,7],
          });
          const ts = new Date(p.pinned_at + 'Z').toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
          L.marker([p.lat, p.lng], { icon })
            .addTo(_leafletMap)
            .bindPopup(`<strong>${p.worker_name}</strong><br>${ts}`);
          latlngs.push([p.lat, p.lng]);
        });
        _leafletMap.fitBounds(L.latLngBounds(latlngs), { padding: [30,30], maxZoom: 15 });
      }
    }

    // ── Live sig counts ───────────────────────────────────────────────────────
    async function loadLeaderboard() {
      try {
        const data = await api('/stats/live');
        const el = document.getElementById('lbList');
        const sorted = [...data].filter(e => e.sig_count > 0).sort((a,b) => b.sig_count - a.sig_count);
        if (!sorted.length) { el.innerHTML = '<div class="empty">No counts submitted yet</div>'; return; }
        el.innerHTML = sorted.map((e, i) => {
          const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
          return `<div class="lb-row">
            <div class="lb-rank">${medal}</div>
            <div class="lb-name">${e.full_name}</div>
            <div class="lb-sigs">${e.sig_count.toLocaleString()}</div>
          </div>`;
        }).join('');
      } catch(e) {
        document.getElementById('lbList').innerHTML = '<div class="empty">Could not load</div>';
      }
    }

    // ── Schedule grid ─────────────────────────────────────────────────────────
    const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    let _weekOffset = 0;
    let _schedWorkers = [];
    let _schedShifts  = [];
    let _schedMonday  = null;
    let _mobileDayIdx = 0;

    function getMonday(offset) {
      const d = new Date();
      const day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 1 + offset * 7);
      d.setHours(0,0,0,0);
      return d;
    }

    function fmtDate(d) {
      return d.toISOString().slice(0,10);
    }

    function fmtWeekLabel(mon) {
      const sun = new Date(mon); sun.setDate(mon.getDate()+6);
      const opts = {month:'short', day:'numeric'};
      return mon.toLocaleDateString([],opts) + ' — ' + sun.toLocaleDateString([],opts);
    }

    async function loadSchedule() {
      const monday = getMonday(_weekOffset);
      _schedMonday = monday;
      document.getElementById('fmWeekLabel').textContent = fmtWeekLabel(monday);
      try {
        const [allWorkers, shifts] = await Promise.all([
          api('/workers'),
          api('/shifts?date_from=' + fmtDate(monday)),
        ]);
        const workers = allWorkers.filter(w => w.role === 'petitioner' || w.role === 'worker' || w.role === 'office_worker');
        _schedWorkers = workers;
        _schedShifts  = shifts;
        _mobileDayIdx = 0;
        renderSchedule();
      } catch(e) {
        document.getElementById('fmScheduleGrid').innerHTML = '<div class="empty">Could not load schedule</div>';
      }
    }

    function renderSchedule() {
      const el = document.getElementById('fmScheduleGrid');
      if (!_schedWorkers.length) { el.innerHTML = '<div class="empty">No workers</div>'; return; }
      const monday = _schedMonday;
      const isMobile = window.innerWidth <= 600;

      if (isMobile) {
        // Day pills + single-day list
        let pills = '<div style="display:flex;gap:6px;overflow-x:auto;padding:0 16px 10px;-webkit-overflow-scrolling:touch">';
        DAYS.forEach((d, i) => {
          const date = new Date(monday); date.setDate(monday.getDate()+i);
          const ds = fmtDate(date);
          const active = i === _mobileDayIdx;
          const has = _schedShifts.some(s => s.clock_in.startsWith(ds));
          pills += `<button onclick="selectDay(${i})" style="flex-shrink:0;padding:7px 12px;border-radius:18px;border:1.5px solid ${active?'#0a84ff':'#e5e5ea'};background:${active?'#0a84ff':'#fff'};color:${active?'#fff':'#3c3c43'};font-size:.78rem;font-weight:${active?'700':'400'};cursor:pointer;position:relative">
            ${d} <span style="opacity:.7">${date.getMonth()+1}/${date.getDate()}</span>
            ${has?'<span style="position:absolute;top:3px;right:3px;width:5px;height:5px;background:#30d158;border-radius:50%"></span>':''}
          </button>`;
        });
        pills += '</div>';

        const selDate = new Date(monday); selDate.setDate(monday.getDate()+_mobileDayIdx);
        const selStr = fmtDate(selDate);
        let rows = '<div style="padding:0 16px 8px">';
        _schedWorkers.forEach(w => {
          const dayShifts = _schedShifts.filter(s => s.worker_id===w.id && s.clock_in.startsWith(selStr));
          let shiftHtml = dayShifts.map(s => {
            const inT = s.clock_in.split('T')[1]?.slice(0,5)||'';
            const outT = s.clock_out ? s.clock_out.split('T')[1]?.slice(0,5) : '';
            const lbl = outT ? `${inT}–${outT}` : `${inT} ●`;
            return `<span class="wg-shift" onclick="openFMEdit(${s.id},'${s.clock_in}','${s.clock_out||''}')">${lbl}</span>`;
          }).join('');
          if (!shiftHtml) shiftHtml = `<button onclick="openFMAdd(${w.id},'${w.full_name.replace(/'/g,"\\'")}','${selStr}')" style="border:1.5px dashed #ccc;background:none;color:#aaa;border-radius:6px;padding:3px 10px;font-size:.78rem;cursor:pointer">+ Add</button>`;
          rows += `<div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid #f2f2f7">
            <span style="flex:1;font-size:.88rem;font-weight:600">${w.full_name}</span>
            <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end">${shiftHtml}</div>
          </div>`;
        });
        rows += '</div>';
        el.innerHTML = pills + rows;
      } else {
        // Desktop grid
        let html = `<div class="week-grid" style="grid-template-columns:140px repeat(7,1fr);padding:0 16px 8px">`;
        html += '<div class="wg-header">Worker</div>';
        DAYS.forEach((d,i) => {
          const date = new Date(monday); date.setDate(monday.getDate()+i);
          html += `<div class="wg-header">${d}<br><span style="font-weight:400">${date.getMonth()+1}/${date.getDate()}</span></div>`;
        });
        _schedWorkers.forEach(w => {
          html += `<div class="wg-worker">${w.full_name}</div>`;
          for (let i=0;i<7;i++) {
            const date = new Date(monday); date.setDate(monday.getDate()+i);
            const ds = fmtDate(date);
            const dayShifts = _schedShifts.filter(s => s.worker_id===w.id && s.clock_in.startsWith(ds));
            if (dayShifts.length) {
              html += '<div class="wg-cell">';
              dayShifts.forEach(s => {
                const inT = s.clock_in.split('T')[1]?.slice(0,5)||'';
                const outT = s.clock_out ? s.clock_out.split('T')[1]?.slice(0,5) : '';
                const lbl = outT ? `${inT}–${outT}` : `${inT} ●`;
                html += `<div class="wg-shift" onclick="openFMEdit(${s.id},'${s.clock_in}','${s.clock_out||''}')">${lbl}</div>`;
              });
              html += '</div>';
            } else {
              html += `<div class="wg-cell" style="cursor:pointer;background:#fafff9" onclick="openFMAdd(${w.id},'${w.full_name.replace(/'/g,"\\'")}','${ds}')">
                <div style="color:#ccc;font-size:1.1rem;text-align:center;line-height:34px">+</div>
              </div>`;
            }
          }
        });
        html += '</div>';
        el.innerHTML = html;
      }
    }

    function selectDay(i) { _mobileDayIdx = i; renderSchedule(); }
    function prevWeek() { _weekOffset--; loadSchedule(); }
    function nextWeek() { _weekOffset++; loadSchedule(); }

    function openFMAdd(workerId, workerName, dateStr) {
      document.getElementById('fmAddShiftWorkerId').value = workerId;
      document.getElementById('fmAddShiftDate').value = dateStr;
      document.getElementById('fmAddShiftTitle').textContent = `Add Shift — ${workerName} (${dateStr})`;
      document.getElementById('fmAddShiftErr').style.display = 'none';
      document.getElementById('fmAddShiftModal').classList.add('open');
    }

    async function submitFMAddShift() {
      const workerId = document.getElementById('fmAddShiftWorkerId').value;
      const date     = document.getElementById('fmAddShiftDate').value;
      const start    = document.getElementById('fmAddShiftStart').value;
      const errEl    = document.getElementById('fmAddShiftErr');
      errEl.style.display = 'none';
      if (!start) { errEl.textContent = 'Enter a start time.'; errEl.style.display='block'; return; }
      try {
        await api('/shifts/clock-in-at', { method:'POST', body: JSON.stringify({ worker_id: parseInt(workerId), clock_in: `${date}T${start}:00` }) });
        closeFMModal('fmAddShiftModal');
        loadSchedule();
      } catch(e) { errEl.textContent = e.message; errEl.style.display='block'; }
    }

    function openFMEdit(shiftId, clockIn, clockOut) {
      document.getElementById('fmEditShiftId').value = shiftId;
      document.getElementById('fmEditShiftStart').value = clockIn.split('T')[1]?.slice(0,5)||'';
      document.getElementById('fmEditShiftEnd').value = clockOut ? clockOut.split('T')[1]?.slice(0,5) : '';
      const date = clockIn.split('T')[0];
      document.getElementById('fmEditShiftTitle').textContent = `Edit Shift — ${date}`;
      document.getElementById('fmEditShiftErr').style.display = 'none';
      document.getElementById('fmEditShiftModal').classList.add('open');
    }

    async function submitFMEditShift() {
      const id      = document.getElementById('fmEditShiftId').value;
      const startV  = document.getElementById('fmEditShiftStart').value;
      const endV    = document.getElementById('fmEditShiftEnd').value;
      const errEl   = document.getElementById('fmEditShiftErr');
      const dateStr = document.getElementById('fmEditShiftTitle').textContent.split('— ')[1]||'';
      errEl.style.display = 'none';
      if (!startV) { errEl.textContent='Start time required.'; errEl.style.display='block'; return; }
      try {
        await api(`/shifts/${id}/times`, { method:'PATCH', body: JSON.stringify({ clock_in:`${dateStr}T${startV}:00`, clock_out: endV?`${dateStr}T${endV}:00`:null }) });
        closeFMModal('fmEditShiftModal');
        loadSchedule();
      } catch(e) { errEl.textContent=e.message; errEl.style.display='block'; }
    }

    async function removeFMShift() {
      const id = document.getElementById('fmEditShiftId').value;
      if (!confirm('Remove this shift?')) return;
      try {
        await api(`/shifts/${id}`, { method:'DELETE' });
        closeFMModal('fmEditShiftModal');
        loadSchedule();
      } catch(e) { alert(e.message); }
    }

    function closeFMModal(id) { document.getElementById(id).classList.remove('open'); }

    async function refresh() {
      try {
        const [pins] = await Promise.all([
          api('/locations/pins'),
          loadLeaderboard(),
        ]);
        await loadMap(pins);
        document.getElementById('lastRefresh').textContent =
          'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      } catch(e) {
        console.error('refresh error', e);
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/';
    }

    refresh();
    loadSchedule();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
