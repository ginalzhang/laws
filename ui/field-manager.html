<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f2f2f7">
  <title>Field Manager</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: #f2f2f7;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      background: #fff;
      padding: 20px 20px 14px;
      border-bottom: 0.5px solid #e5e5ea;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 1.2rem; font-weight: 700; }
    .header-sub   { font-size: .8rem; color: #8e8e93; margin-top: 2px; }
    .refresh-btn {
      padding: 8px 16px; border: 1.5px solid #e5e5ea; border-radius: 10px;
      background: #fff; font-size: .85rem; font-weight: 600; font-family: inherit;
      cursor: pointer; color: #0a84ff;
    }
    .refresh-btn:active { background: #f2f2f7; }

    .content { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    /* Action buttons row */
    .action-row { display: flex; gap: 10px; }
    .action-btn {
      flex: 1; padding: 14px 10px;
      border: none; border-radius: 14px;
      font-size: .9rem; font-weight: 700; font-family: inherit;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 5px;
      transition: opacity .15s, transform .1s;
      -webkit-appearance: none;
    }
    .action-btn:active  { transform: scale(.96); opacity: .85; }
    .action-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .action-btn .icon   { font-size: 1.4rem; }
    .action-btn .label  { font-size: .78rem; font-weight: 600; }
    .action-btn .sub    { font-size: .68rem; font-weight: 400; opacity: .75; }
    .btn-blue  { background: #0a84ff; color: #fff; }
    .btn-green { background: #30d158; color: #fff; }
    .btn-red   { background: #ff3b30; color: #fff; }

    .msg {
      font-size: .82rem; text-align: center; min-height: 16px;
      color: #8e8e93;
    }
    .msg.success { color: #2e7d32; }
    .msg.error   { color: #c62828; }

    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 0 0 0.5px rgba(0,0,0,.04);
      overflow: hidden;
    }
    .card-title {
      font-size: .9rem; font-weight: 700; color: #000;
      padding: 14px 16px 0;
    }

    #mapContainer { height: 320px; }

    .pins-list { padding: 0 16px 8px; }
    .pin-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0; border-bottom: 0.5px solid #f2f2f7;
    }
    .pin-row:last-child { border-bottom: none; }
    .pin-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .pin-name { font-weight: 600; font-size: .875rem; }
    .pin-time { color: #8e8e93; font-size: .75rem; margin-left: 6px; }
    .pin-coords { font-size: .72rem; color: #8e8e93; text-align: right; flex-shrink: 0; }

    .leaderboard-list { padding: 0 16px 8px; }
    .lb-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 0.5px solid #f2f2f7;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank { font-size: .8rem; color: #8e8e93; width: 20px; flex-shrink: 0; text-align: center; }
    .lb-name { flex: 1; font-size: .9rem; font-weight: 600; }
    .lb-sigs { font-size: .9rem; font-weight: 700; color: #0a84ff; }
    .lb-rate { font-size: .75rem; color: #8e8e93; margin-left: 4px; }

    .empty { padding: 20px; text-align: center; color: #8e8e93; font-size: .85rem; }

    .logout-link {
      text-align: center; padding: 8px;
      font-size: .8rem; color: #8e8e93; cursor: pointer;
    }
    .logout-link:hover { color: #ff3b30; }

    /* Sig count sheet */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
      align-items: flex-end; justify-content: center; z-index: 100;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: #fff; border-radius: 22px 22px 0 0;
      padding: 28px 24px calc(28px + env(safe-area-inset-bottom));
      width: 100%; max-width: 480px;
    }
    .sheet h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
    .sheet input[type=number] {
      width: 100%; padding: 16px; border: 1.5px solid #e5e5ea; border-radius: 14px;
      font-size: 2rem; font-weight: 700; font-family: inherit;
      text-align: center; outline: none; background: #f9f9fb;
      -webkit-appearance: none; appearance: none;
    }
    .sheet input[type=number]:focus { border-color: #0a84ff; background: #fff; }
    .sheet-btns { display: flex; gap: 12px; margin-top: 16px; }
    .sheet-btns button {
      flex: 1; padding: 14px; border: none; border-radius: 14px;
      font-size: 1rem; font-weight: 600; font-family: inherit; cursor: pointer;
    }
    .btn-cancel { background: #f2f2f7; color: #000; }
    .btn-submit { background: #0a84ff; color: #fff; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title" id="managerName">Field Manager</div>
      <div class="header-sub" id="lastRefresh">Loading…</div>
    </div>
    <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
  </div>

  <div class="content">

    <!-- Quick actions -->
    <div class="action-row">
      <button class="action-btn btn-blue" id="sigBtn" onclick="openSigSheet()">
        <span class="icon">✍️</span>
        <span class="label">Submit Sigs</span>
        <span class="sub" id="mySigCount">Tap to update</span>
      </button>
      <button class="action-btn btn-green" id="locBtn" onclick="shareLocation()">
        <span class="icon">📍</span>
        <span class="label">Drop Pin</span>
        <span class="sub">Share my location</span>
      </button>
      <button class="action-btn btn-red" id="clearPinBtn" onclick="clearPin()">
        <span class="icon">🗑️</span>
        <span class="label">Remove Pin</span>
        <span class="sub">Delete my location</span>
      </button>
    </div>
    <div class="msg" id="statusMsg"></div>

    <!-- Map -->
    <div class="card">
      <div class="card-title" style="padding-bottom:10px">Live Map</div>
      <div id="mapContainer"></div>
    </div>

    <!-- Recent pins list -->
    <div class="card">
      <div class="card-title">Recent Location Pins</div>
      <div class="pins-list" id="pinsList"><div class="empty">Loading…</div></div>
    </div>

    <!-- Sig counts leaderboard -->
    <div class="card">
      <div class="card-title">Live Signature Counts</div>
      <div class="leaderboard-list" id="lbList"><div class="empty">Loading…</div></div>
    </div>

    <div class="logout-link" onclick="logout()">Sign out</div>
  </div>

  <!-- Sig count sheet -->
  <div class="overlay" id="sigOverlay">
    <div class="sheet">
      <h2>How many signatures today?</h2>
      <input type="number" id="sigInput" min="0" max="9999" placeholder="0">
      <div class="sheet-btns">
        <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
        <button class="btn-submit" id="sigSubmitBtn" onclick="submitSigCount()">Submit</button>
      </div>
    </div>
  </div>

  <script>
    const token    = localStorage.getItem('pv_token');
    const userName = localStorage.getItem('pv_full_name');
    if (!token) { window.location.href = '/'; }
    document.getElementById('managerName').textContent = userName || 'Field Manager';

    const storedCount = sessionStorage.getItem('pv_sig_count');
    if (storedCount) document.getElementById('mySigCount').textContent = storedCount + ' sigs today';

    function api(path, opts = {}) {
      return fetch(path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...(opts.headers || {}) },
      }).then(async r => {
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Request failed');
        return d;
      });
    }

    function setMsg(text, type = '') {
      const el = document.getElementById('statusMsg');
      el.textContent = text;
      el.className = 'msg' + (type ? ' ' + type : '');
      if (type) setTimeout(() => { el.textContent = ''; el.className = 'msg'; }, 3000);
    }

    // ── Sig count ─────────────────────────────────────────────────────────────
    function openSigSheet() {
      document.getElementById('sigInput').value = sessionStorage.getItem('pv_sig_count') || '';
      document.getElementById('sigOverlay').classList.add('open');
      setTimeout(() => document.getElementById('sigInput').focus(), 80);
    }

    function closeSheet() {
      document.getElementById('sigOverlay').classList.remove('open');
    }

    async function submitSigCount() {
      const val = parseInt(document.getElementById('sigInput').value, 10);
      if (isNaN(val) || val < 0) { setMsg('Enter a valid number', 'error'); return; }
      const btn = document.getElementById('sigSubmitBtn');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        await api('/stats/sig-count', { method: 'POST', body: JSON.stringify({ count: val }) });
        sessionStorage.setItem('pv_sig_count', val);
        document.getElementById('mySigCount').textContent = val + ' sigs today';
        closeSheet();
        setMsg('Sig count updated!', 'success');
        loadLeaderboard();
      } catch(e) { setMsg(e.message, 'error'); }
      btn.disabled = false; btn.textContent = 'Submit';
    }

    document.getElementById('sigOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeSheet();
    });

    // ── Location ──────────────────────────────────────────────────────────────
    async function clearPin() {
      const btn = document.getElementById('clearPinBtn');
      btn.disabled = true;
      try {
        await api('/stats/location', { method: 'DELETE' });
        setMsg('Pin removed!', 'success');
        refresh();
      } catch(e) { setMsg(e.message, 'error'); }
      btn.disabled = false;
    }

    async function shareLocation() {
      if (!navigator.geolocation) { setMsg('Geolocation not supported', 'error'); return; }
      const btn = document.getElementById('locBtn');
      btn.disabled = true;
      setMsg('Getting location…');
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          try {
            await api('/stats/location', {
              method: 'POST',
              body: JSON.stringify({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
            });
            setMsg('Pin dropped!', 'success');
            const [pins] = await Promise.all([api('/locations/pins'), loadLeaderboard()]);
            await loadMap(pins);
          } catch(e) { setMsg(e.message, 'error'); }
          btn.disabled = false;
        },
        (err) => {
          setMsg(err.code === 1 ? 'Location access denied — allow it in browser settings' : 'Could not get location', 'error');
          btn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    // ── Map ───────────────────────────────────────────────────────────────────
    let _leafletMap = null;
    const _workerColors = ['#0a84ff','#30d158','#ff9f0a','#bf5af2','#ff375f','#64d2ff','#ffd60a','#ff6961'];
    const _colorFor = (() => { const m = {}; let i = 0; return id => (m[id] = m[id] ?? _workerColors[i++ % _workerColors.length]); })();

    async function loadMap(pins) {
      const listEl = document.getElementById('pinsList');
      if (!pins.length) {
        listEl.innerHTML = '<div class="empty">No pins yet</div>';
      } else {
        listEl.innerHTML = pins.slice(0, 30).map(p => {
          const t   = new Date(p.pinned_at + 'Z').toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
          const d   = new Date(p.pinned_at + 'Z').toLocaleDateString([], {month:'short', day:'numeric'});
          const col = _colorFor(p.worker_id);
          return `<div class="pin-row">
            <div class="pin-dot" style="background:${col}"></div>
            <div style="flex:1">
              <span class="pin-name">${p.worker_name}</span>
              <span class="pin-time">${d} ${t}</span>
              ${p.note ? `<div style="font-size:.78rem;color:#6e6e73;margin-top:2px">${p.note}</div>` : ''}
            </div>
            <div class="pin-coords">${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}</div>
          </div>`;
        }).join('');
      }

      if (!_leafletMap) {
        _leafletMap = L.map('mapContainer').setView([37.7749, -122.4194], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap contributors', maxZoom: 19,
        }).addTo(_leafletMap);
      } else {
        _leafletMap.eachLayer(l => { if (l instanceof L.Marker) _leafletMap.removeLayer(l); });
      }

      if (pins.length) {
        const latlngs = [];
        pins.forEach(p => {
          const col  = _colorFor(p.worker_id);
          const icon = L.divIcon({
            html: `<div style="width:14px;height:14px;border-radius:50%;background:${col};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
            className: '', iconSize: [14,14], iconAnchor: [7,7],
          });
          const ts = new Date(p.pinned_at + 'Z').toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
          L.marker([p.lat, p.lng], { icon })
            .addTo(_leafletMap)
            .bindPopup(`<strong>${p.worker_name}</strong><br>${ts}`);
          latlngs.push([p.lat, p.lng]);
        });
        _leafletMap.fitBounds(L.latLngBounds(latlngs), { padding: [30,30], maxZoom: 15 });
      }
    }

    // ── Live sig counts ───────────────────────────────────────────────────────
    async function loadLeaderboard() {
      try {
        const data = await api('/stats/live');
        const el = document.getElementById('lbList');
        const sorted = [...data].filter(e => e.sig_count > 0).sort((a,b) => b.sig_count - a.sig_count);
        if (!sorted.length) { el.innerHTML = '<div class="empty">No counts submitted yet</div>'; return; }
        el.innerHTML = sorted.map((e, i) => {
          const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
          return `<div class="lb-row">
            <div class="lb-rank">${medal}</div>
            <div class="lb-name">${e.full_name}</div>
            <div class="lb-sigs">${e.sig_count.toLocaleString()}</div>
          </div>`;
        }).join('');
      } catch(e) {
        document.getElementById('lbList').innerHTML = '<div class="empty">Could not load</div>';
      }
    }

    async function refresh() {
      try {
        const [pins] = await Promise.all([
          api('/locations/pins'),
          loadLeaderboard(),
        ]);
        await loadMap(pins);
        document.getElementById('lastRefresh').textContent =
          'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      } catch(e) {
        console.error('refresh error', e);
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/';
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
