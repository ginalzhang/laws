<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f2f2f7">
  <title>Canvasser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: #f2f2f7;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: #fff;
      padding: 20px 20px 16px;
      border-bottom: 0.5px solid #e5e5ea;
    }
    .header-name { font-size: 1.25rem; font-weight: 700; color: #000; }
    .header-sub  { font-size: .875rem; color: #8e8e93; margin-top: 2px; }
    .sig-count   { font-size: 3.5rem; font-weight: 800; color: #0a84ff; line-height: 1; margin-top: 4px; }
    .sig-label   { font-size: .8rem; color: #8e8e93; margin-top: 2px; }

    .content { padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; }

    .big-btn {
      width: 100%; padding: 20px;
      border: none; border-radius: 16px;
      font-size: 1.1rem; font-weight: 700; font-family: inherit;
      cursor: pointer; display: flex; align-items: center; gap: 14px;
      transition: opacity .15s, transform .1s;
      -webkit-appearance: none;
    }
    .big-btn:active { transform: scale(.97); opacity: .88; }
    .big-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .big-btn .icon { font-size: 1.5rem; flex-shrink: 0; }
    .big-btn .label { text-align: left; }
    .big-btn .label .title { display: block; }
    .big-btn .label .sub   { display: block; font-size: .8rem; font-weight: 400; opacity: .7; margin-top: 2px; }

    .btn-blue  { background: #0a84ff; color: #fff; }
    .btn-green { background: #30d158; color: #fff; }
    .btn-red   { background: #ff3b30; color: #fff; }

    .msg {
      font-size: .82rem; color: #8e8e93; text-align: center;
      min-height: 18px; padding: 0 4px;
    }
    .msg.success { color: #2e7d32; }
    .msg.error   { color: #c62828; }

    /* Leaderboard card */
    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 0 0 0.5px rgba(0,0,0,.04);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 16px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-size: .9rem; font-weight: 700; color: #000; }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #30d158;
      display: inline-block; margin-right: 6px;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .35; }
    }
    .last-update { font-size: .72rem; color: #8e8e93; }

    .lb-list { padding: 0 16px 10px; }
    .lb-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 0.5px solid #f2f2f7;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row.me { background: #f0f7ff; margin: 0 -16px; padding: 10px 16px; }

    .lb-rank {
      font-size: .78rem; color: #8e8e93;
      width: 22px; flex-shrink: 0; text-align: center; font-weight: 600;
    }
    .lb-rank.top { color: #ff9f0a; }
    .lb-name { flex: 1; font-size: .9rem; font-weight: 600; }
    .lb-name .you-tag {
      font-size: .68rem; font-weight: 600; color: #0a84ff;
      background: #e3f0ff; padding: 1px 6px; border-radius: 10px;
      margin-left: 6px; vertical-align: middle;
    }
    .lb-sigs { font-size: .95rem; font-weight: 700; color: #0a84ff; }
    .lb-empty { padding: 20px; text-align: center; color: #8e8e93; font-size: .85rem; }

    /* Sig input overlay */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
      align-items: flex-end; justify-content: center; z-index: 100;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: #fff; border-radius: 22px 22px 0 0;
      padding: 28px 24px calc(28px + env(safe-area-inset-bottom));
      width: 100%; max-width: 480px;
    }
    .sheet h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
    .sheet input[type=number] {
      width: 100%; padding: 16px; border: 1.5px solid #e5e5ea; border-radius: 14px;
      font-size: 2rem; font-weight: 700; font-family: inherit;
      text-align: center; outline: none; background: #f9f9fb;
      -webkit-appearance: none; appearance: none;
    }
    .sheet input[type=number]:focus { border-color: #0a84ff; background: #fff; }
    .sheet-btns { display: flex; gap: 12px; margin-top: 16px; }
    .sheet-btns button {
      flex: 1; padding: 14px; border: none; border-radius: 14px;
      font-size: 1rem; font-weight: 600; font-family: inherit; cursor: pointer;
    }
    .btn-cancel { background: #f2f2f7; color: #000; }
    .btn-submit { background: #0a84ff; color: #fff; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    .logout-link {
      text-align: center;
      font-size: .8rem; color: #8e8e93; cursor: pointer; padding: 4px;
    }
    .logout-link:hover { color: #ff3b30; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-name" id="workerName">—</div>
    <div class="header-sub">Today's signatures</div>
    <div class="sig-count" id="sigCount">—</div>
    <div class="sig-label">submitted today</div>
  </div>

  <div class="content">
    <button class="big-btn btn-blue" id="sigBtn" onclick="openSigSheet()">
      <span class="icon">✍️</span>
      <span class="label">
        <span class="title">Submit Sig Count</span>
        <span class="sub">Update your signature total</span>
      </span>
    </button>

    <button class="big-btn btn-green" id="locBtn" onclick="shareLocation()">
      <span class="icon">📍</span>
      <span class="label">
        <span class="title">Share My Location</span>
        <span class="sub">Let your manager see where you are</span>
      </span>
    </button>

    <button class="big-btn btn-red" id="clearPinBtn" onclick="clearPin()">
      <span class="icon">🗑️</span>
      <span class="label">
        <span class="title">Remove My Pin</span>
        <span class="sub">Delete your location from the map</span>
      </span>
    </button>

    <div class="msg" id="statusMsg"></div>

    <!-- Live leaderboard -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="live-dot"></span>Live Today</div>
        <div class="last-update" id="lbUpdated"></div>
      </div>
      <div class="lb-list" id="lbList">
        <div class="lb-empty">Loading…</div>
      </div>
    </div>

    <div class="logout-link" onclick="logout()">Sign out</div>
  </div>

  <!-- Sig count sheet -->
  <div class="overlay" id="sigOverlay">
    <div class="sheet">
      <h2>How many signatures today?</h2>
      <input type="number" id="sigInput" min="0" max="9999" placeholder="0">
      <div class="sheet-btns">
        <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
        <button class="btn-submit" id="sigSubmitBtn" onclick="submitSigCount()">Submit</button>
      </div>
    </div>
  </div>

  <script>
    const token    = localStorage.getItem('pv_token');
    const userName = localStorage.getItem('pv_full_name');
    const userId   = parseInt(localStorage.getItem('pv_user_id') || '0', 10);

    if (!token) { window.location.href = '/'; }

    document.getElementById('workerName').textContent = userName || 'Canvasser';

    document.getElementById('sigCount').textContent = sessionStorage.getItem('pv_sig_count') ?? '—';

    function api(path, opts = {}) {
      return fetch(path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...(opts.headers || {}) },
      }).then(async r => {
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Request failed');
        return d;
      });
    }

    function setMsg(text, type = '') {
      const el = document.getElementById('statusMsg');
      el.textContent = text;
      el.className = 'msg' + (type ? ' ' + type : '');
    }

    function openSigSheet() {
      const stored = sessionStorage.getItem('pv_sig_count');
      document.getElementById('sigInput').value = stored != null ? stored : '';
      document.getElementById('sigOverlay').classList.add('open');
      setTimeout(() => document.getElementById('sigInput').focus(), 80);
    }

    function closeSheet() {
      document.getElementById('sigOverlay').classList.remove('open');
    }

    async function submitSigCount() {
      const val = parseInt(document.getElementById('sigInput').value, 10);
      if (isNaN(val) || val < 0) { setMsg('Enter a valid number', 'error'); return; }
      const btn = document.getElementById('sigSubmitBtn');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        await api('/stats/sig-count', { method: 'POST', body: JSON.stringify({ count: val }) });
        sessionStorage.setItem('pv_sig_count', val);
        document.getElementById('sigCount').textContent = val;
        closeSheet();
        setMsg('Sig count updated!', 'success');
        loadLeaderboard();
      } catch(e) {
        setMsg(e.message, 'error');
      }
      btn.disabled = false; btn.textContent = 'Submit';
    }

    async function clearPin() {
      const btn = document.getElementById('clearPinBtn');
      btn.disabled = true;
      try {
        await api('/stats/location', { method: 'DELETE' });
        setMsg('Pin removed!', 'success');
      } catch(e) { setMsg(e.message, 'error'); }
      btn.disabled = false;
    }

    async function shareLocation() {
      if (!navigator.geolocation) { setMsg('Geolocation not supported on this device', 'error'); return; }
      const btn = document.getElementById('locBtn');
      btn.disabled = true;
      setMsg('Getting location…');
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          try {
            await api('/stats/location', {
              method: 'POST',
              body: JSON.stringify({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
            });
            setMsg('Location shared!', 'success');
          } catch(e) { setMsg(e.message, 'error'); }
          btn.disabled = false;
        },
        (err) => {
          setMsg(err.code === 1 ? 'Location access denied — allow it in browser settings' : 'Could not get location', 'error');
          btn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    async function loadLeaderboard() {
      try {
        const data = await api('/stats/live');
        const el   = document.getElementById('lbList');
        if (!data.length) {
          el.innerHTML = '<div class="lb-empty">No counts submitted yet — be the first!</div>';
          return;
        }
        const sorted = [...data]
          .filter(e => e.sig_count > 0)
          .sort((a, b) => b.sig_count - a.sig_count);
        if (!sorted.length) {
          el.innerHTML = '<div class="lb-empty">No counts submitted yet — be the first!</div>';
          return;
        }
        const myName = (userName || '').toLowerCase();
        el.innerHTML = sorted.map((e, i) => {
          const isMe  = e.full_name.toLowerCase() === myName;
          const rank  = i + 1;
          const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
          return `<div class="lb-row${isMe ? ' me' : ''}">
            <div class="lb-rank${rank <= 3 ? ' top' : ''}">${medal}</div>
            <div class="lb-name">${e.full_name}${isMe ? '<span class="you-tag">you</span>' : ''}</div>
            <div class="lb-sigs">${e.sig_count.toLocaleString()}</div>
          </div>`;
        }).join('');
        document.getElementById('lbUpdated').textContent =
          new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      } catch(e) {
        document.getElementById('lbList').innerHTML = '<div class="lb-empty">Could not load</div>';
      }
    }

    function logout() {
      localStorage.clear(); sessionStorage.clear();
      window.location.href = '/';
    }

    document.getElementById('sigOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeSheet();
    });

    async function initMyCount() {
      try {
        const data = await api('/stats/my-count');
        if (data.sig_count > 0) {
          sessionStorage.setItem('pv_sig_count', data.sig_count);
          document.getElementById('sigCount').textContent = data.sig_count;
        }
      } catch(e) {}
    }

    initMyCount();
    loadLeaderboard();
    setInterval(loadLeaderboard, 30000);
  </script>
</body>
</html>
