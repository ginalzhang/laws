<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1c1c1e">
  <title>Canvasser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: #f2f2f7;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Dark header ─────────────────────────────────────────────────────────── */
    .header {
      background: #1c1c1e;
      padding: calc(env(safe-area-inset-top) + 20px) 20px 24px;
    }
    .header-name { font-size: 1rem; font-weight: 600; color: rgba(255,255,255,.55); }
    .header-sub  { font-size: .78rem; color: rgba(255,255,255,.4); margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }
    .sig-count   { font-size: 4.5rem; font-weight: 800; color: #fff; line-height: 1; margin-top: 6px; font-variant-numeric: tabular-nums; }
    .sig-label   { font-size: .7rem; color: rgba(255,255,255,.45); margin-top: 3px; text-transform: uppercase; letter-spacing: .06em; }

    .pace-bar-wrap { margin-top: 14px; }
    .pace-bar-meta { display: flex; justify-content: space-between; font-size: .72rem; color: rgba(255,255,255,.5); margin-bottom: 5px; }
    .pace-bar-meta .pace-label { font-weight: 600; }
    .pace-bar-track { height: 4px; background: rgba(255,255,255,.15); border-radius: 3px; overflow: hidden; }
    .pace-bar-fill  { height: 100%; border-radius: 3px; transition: width .5s, background .5s; }
    .pace-sub { display: flex; justify-content: space-between; margin-top: 5px; font-size: .68rem; color: rgba(255,255,255,.35); }

    /* ── Page content ────────────────────────────────────────────────────────── */
    .content { padding: 20px 16px env(safe-area-inset-bottom); display: flex; flex-direction: column; gap: 14px; }

    .big-btn {
      width: 100%; padding: 20px;
      border: none; border-radius: 16px;
      font-size: 1.1rem; font-weight: 700; font-family: inherit;
      cursor: pointer; display: flex; align-items: center; gap: 14px;
      transition: opacity .15s, transform .1s; -webkit-appearance: none;
    }
    .big-btn:active { transform: scale(.97); opacity: .88; }
    .big-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .big-btn .icon  { font-size: 1.5rem; flex-shrink: 0; }
    .big-btn .label { text-align: left; }
    .big-btn .label .title { display: block; }
    .big-btn .label .sub   { display: block; font-size: .8rem; font-weight: 400; opacity: .7; margin-top: 2px; }
    .btn-blue  { background: #0a84ff; color: #fff; }

    .msg { font-size: .82rem; color: #8e8e93; text-align: center; min-height: 18px; }
    .msg.success { color: #2e7d32; }
    .msg.error   { color: #c62828; }

    .loc-section { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 0 0 .5px rgba(0,0,0,.04); }
    .loc-toggle { width: 100%; background: none; border: none; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; font-size: .9rem; font-weight: 600; font-family: inherit; cursor: pointer; color: #000; }
    .loc-toggle .arrow { font-size: .75rem; color: #8e8e93; transition: transform .2s; }
    .loc-toggle.open .arrow { transform: rotate(180deg); }
    .loc-inner { display: none; flex-direction: column; gap: 10px; padding: 0 12px 12px; }
    .loc-inner.open { display: flex; }
    .loc-btn { width: 100%; padding: 14px 16px; border: none; border-radius: 12px; font-size: .95rem; font-weight: 600; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 12px; -webkit-appearance: none; }
    .loc-btn:active { opacity: .85; }
    .loc-btn.green { background: #30d158; color: #fff; }
    .loc-btn.red   { background: #ff3b30; color: #fff; }

    .card { background: #fff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 0 0 .5px rgba(0,0,0,.04); overflow: hidden; }
    .card-header { padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: .9rem; font-weight: 700; color: #000; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #30d158; display: inline-block; margin-right: 6px; animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .last-update { font-size: .72rem; color: #8e8e93; }
    .lb-list { padding: 0 16px 10px; }
    .lb-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: .5px solid #f2f2f7; }
    .lb-row:last-child { border-bottom: none; }
    .lb-row.me { background: #f0f7ff; margin: 0 -16px; padding: 10px 16px; }
    .lb-rank { font-size: .78rem; color: #8e8e93; width: 22px; flex-shrink: 0; text-align: center; font-weight: 600; }
    .lb-rank.top { color: #ff9f0a; }
    .lb-name { flex: 1; font-size: .9rem; font-weight: 600; }
    .lb-name .you-tag { font-size: .68rem; font-weight: 600; color: #0a84ff; background: #e3f0ff; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }
    .lb-sigs { font-size: .95rem; font-weight: 700; color: #0a84ff; }
    .lb-empty { padding: 20px; text-align: center; color: #8e8e93; font-size: .85rem; }

    .team-rank { font-size: .78rem; color: #8e8e93; width: 22px; flex-shrink: 0; text-align: center; font-weight: 600; }
    .team-rank.top { color: #ff9f0a; }
    .team-info { flex: 1; }
    .team-name-row { font-size: .9rem; font-weight: 600; }
    .team-name-row .my-tag { font-size: .68rem; font-weight: 600; color: #30d158; background: #e0f9ea; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }
    .team-mgr  { font-size: .72rem; color: #8e8e93; margin-top: 1px; }
    .team-sigs { font-size: .95rem; font-weight: 700; color: #30d158; }

    .logout-link { text-align: center; font-size: .8rem; color: #8e8e93; cursor: pointer; padding: 4px; }

    /* ── Sig entry modal ─────────────────────────────────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); backdrop-filter: blur(6px);
      align-items: flex-end; justify-content: center; z-index: 100;
    }
    .overlay.open { display: flex; }

    .sheet {
      background: #fff; border-radius: 22px 22px 0 0;
      width: 100%; max-width: 480px;
      max-height: 94dvh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Step 1 — keypad */
    .input-step.hidden { display: none; }

    .sheet-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: .5px solid #e5e5ea;
      position: sticky; top: 0; background: #fff; z-index: 1;
    }
    .sheet-top-title { font-size: .95rem; font-weight: 700; color: #000; }
    .sheet-cancel { font-size: .95rem; color: #0a84ff; background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; }

    .entry-section { padding: 14px 20px 10px; border-bottom: .5px solid #e5e5ea; }
    .entry-label { font-size: .62rem; font-weight: 700; color: #8e8e93; letter-spacing: .07em; text-transform: uppercase; margin-bottom: 4px; }
    .entry-display {
      font-size: 3rem; font-weight: 700; color: #000;
      font-variant-numeric: tabular-nums; letter-spacing: -.02em;
      min-height: 1.15em; line-height: 1.15;
    }
    .entry-display.empty { color: #c7c7cc; }

    .pace-section {
      padding: 10px 20px; border-bottom: .5px solid #e5e5ea;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .pace-icon { font-size: .8rem; color: #8e8e93; }
    .pace-text { font-size: .82rem; color: #3a3a3c; font-weight: 500; flex: 1; }
    .pace-badge {
      padding: 2px 9px; border-radius: 20px;
      font-size: .72rem; font-weight: 700; white-space: nowrap;
    }
    .pace-badge.on     { background: #d1f7e0; color: #248a3d; }
    .pace-badge.behind { background: #fff3cc; color: #a05c00; }
    .pace-badge.none   { background: #f2f2f7; color: #8e8e93; }
    .pace-sub-row { width: 100%; display: flex; justify-content: space-between; font-size: .7rem; color: #8e8e93; }

    .stats-section {
      display: flex; border-bottom: .5px solid #e5e5ea;
    }
    .stat-cell { flex: 1; padding: 12px 0; text-align: center; border-right: .5px solid #e5e5ea; }
    .stat-cell:last-child { border-right: none; }
    .stat-val { font-size: 1.25rem; font-weight: 700; color: #000; }
    .stat-lbl { font-size: .6rem; font-weight: 600; color: #8e8e93; letter-spacing: .05em; text-transform: uppercase; margin-top: 2px; }

    .quick-section { display: flex; gap: 8px; padding: 10px 14px; border-bottom: .5px solid #e5e5ea; }
    .quick-btn {
      flex: 1; padding: 10px 0; border: none; border-radius: 10px;
      background: #f2f2f7; color: #000; font-size: .9rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }
    .quick-btn:active { background: #d1d1d6; transform: scale(.96); }

    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #e5e5ea; }
    .kp-btn {
      background: #fff; border: none;
      padding: 13px 10px; min-height: 52px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; -webkit-user-select: none; user-select: none;
      transition: background .08s;
    }
    .kp-btn:active { background: #d1d1d6; }
    .kp-num { font-size: 1.35rem; font-weight: 400; color: #000; line-height: 1.1; }
    .kp-letters { font-size: .53rem; letter-spacing: .1em; color: #8e8e93; margin-top: 1px; }
    .kp-backspace { font-size: 1.2rem; color: #3a3a3c; }

    .submit-section { padding: 14px 20px calc(14px + env(safe-area-inset-bottom)); background: #fff; }
    .submit-btn {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      background: #0a84ff; color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    .submit-btn:active { opacity: .85; }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* Step 2 — add vs replace */
    .mode-step { display: none; padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); }
    .mode-step.active { display: block; }
    .mode-step h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
    .mode-info { background: #f2f2f7; border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; font-size: .9rem; color: #3a3a3c; line-height: 1.5; }
    .mode-info strong { color: #000; }
    .mode-btns { display: flex; flex-direction: column; gap: 10px; }
    .mode-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600; font-family: inherit; cursor: pointer; text-align: left; }
    .mode-btn:active { opacity: .88; transform: scale(.98); }
    .mode-btn .sub { font-size: .8rem; font-weight: 400; opacity: .7; display: block; margin-top: 2px; }
    .mode-btn.add     { background: #30d158; color: #fff; }
    .mode-btn.replace { background: #f2f2f7; color: #000; }
    .mode-btn.back    { background: none; color: #0a84ff; text-align: center; padding: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-name" id="workerName">—</div>
    <div class="header-sub">Your signature count</div>
    <div class="sig-count" id="sigCount">—</div>
    <div class="sig-label">Signatures collected</div>
    <div id="paceInfo"></div>
  </div>

  <div class="content">
    <button class="big-btn btn-blue" id="sigBtn" onclick="openSigSheet()">
      <span class="icon">✍️</span>
      <span class="label">
        <span class="title" id="sigBtnTitle">Submit Sig Count</span>
        <span class="sub">Tap to enter your signatures</span>
      </span>
    </button>

    <div class="msg" id="statusMsg"></div>

    <div class="loc-section">
      <button class="loc-toggle" id="locToggle" onclick="toggleLoc()">
        <span>📍 Location</span>
        <span class="arrow">▼</span>
      </button>
      <div class="loc-inner" id="locInner">
        <button class="loc-btn green" id="locBtn" onclick="shareLocation()">
          <span>📍</span> Share My Location
        </button>
        <button class="loc-btn red" id="clearPinBtn" onclick="clearPin()">
          <span>🗑️</span> Remove My Pin
        </button>
        <div class="msg" id="locMsg"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="live-dot"></span>Live Today</div>
        <div class="last-update" id="lbUpdated"></div>
      </div>
      <div class="lb-list" id="lbList">
        <div class="lb-empty">Loading…</div>
      </div>
    </div>

    <div class="card" id="teamCard" style="display:none">
      <div class="card-header">
        <div class="card-title">🏆 Team Standings</div>
        <div class="last-update" id="teamUpdated"></div>
      </div>
      <div class="lb-list" id="teamList">
        <div class="lb-empty">Loading…</div>
      </div>
    </div>

    <div class="logout-link" onclick="logout()">Sign out</div>
  </div>

  <!-- Sig count modal -->
  <div class="overlay" id="sigOverlay">
    <div class="sheet">

      <!-- Step 1: keypad entry -->
      <div class="input-step" id="inputStep">
        <div class="sheet-top">
          <span class="sheet-top-title">Enter signature count</span>
          <button class="sheet-cancel" onclick="closeSheet()">Cancel</button>
        </div>

        <div class="entry-section">
          <div class="entry-label">Signatures this entry</div>
          <div class="entry-display empty" id="entryDisplay">0</div>
        </div>

        <div class="pace-section" id="modalPace">
          <span class="pace-icon">⏱</span>
          <span class="pace-text" id="paceText">—</span>
          <span class="pace-badge none" id="paceBadge">No shift</span>
          <div class="pace-sub-row">
            <span id="paceSubLeft">—</span>
            <span id="paceSubRight">—</span>
          </div>
        </div>

        <div class="stats-section">
          <div class="stat-cell">
            <div class="stat-val" id="statSoFar">—</div>
            <div class="stat-lbl">So Far</div>
          </div>
          <div class="stat-cell">
            <div class="stat-val">10</div>
            <div class="stat-lbl">Hourly Goal</div>
          </div>
          <div class="stat-cell">
            <div class="stat-val" id="statNeeded">10</div>
            <div class="stat-lbl">Still Needed</div>
          </div>
        </div>

        <div class="quick-section">
          <button class="quick-btn" onclick="quickAdd(5)">+5</button>
          <button class="quick-btn" onclick="quickAdd(10)">+10</button>
          <button class="quick-btn" onclick="quickAdd(15)">+15</button>
          <button class="quick-btn" onclick="quickAdd(20)">+20</button>
        </div>

        <div class="keypad">
          <button class="kp-btn" onclick="kp('1')"><span class="kp-num">1</span></button>
          <button class="kp-btn" onclick="kp('2')"><span class="kp-num">2</span><span class="kp-letters">ABC</span></button>
          <button class="kp-btn" onclick="kp('3')"><span class="kp-num">3</span><span class="kp-letters">DEF</span></button>
          <button class="kp-btn" onclick="kp('4')"><span class="kp-num">4</span><span class="kp-letters">GHI</span></button>
          <button class="kp-btn" onclick="kp('5')"><span class="kp-num">5</span><span class="kp-letters">JKL</span></button>
          <button class="kp-btn" onclick="kp('6')"><span class="kp-num">6</span><span class="kp-letters">MNO</span></button>
          <button class="kp-btn" onclick="kp('7')"><span class="kp-num">7</span><span class="kp-letters">PQRS</span></button>
          <button class="kp-btn" onclick="kp('8')"><span class="kp-num">8</span><span class="kp-letters">TUV</span></button>
          <button class="kp-btn" onclick="kp('9')"><span class="kp-num">9</span><span class="kp-letters">WXYZ</span></button>
          <button class="kp-btn" onclick="kp('.')"><span class="kp-num" style="font-size:.9rem">·</span></button>
          <button class="kp-btn" onclick="kp('0')"><span class="kp-num">0</span></button>
          <button class="kp-btn" onclick="kp('back')"><span class="kp-backspace">⌫</span></button>
        </div>

        <div class="submit-section">
          <button class="submit-btn" id="sigSubmitBtn" onclick="goToModeStep()">✓ Submit count</button>
        </div>
      </div>

      <!-- Step 2: add vs replace -->
      <div class="mode-step" id="modeStep">
        <h2>What do you want to do?</h2>
        <div class="mode-info" id="modeInfo"></div>
        <div class="mode-btns">
          <button class="mode-btn add" onclick="submitSigCount('add')">
            Add to my total
            <span class="sub" id="addSub"></span>
          </button>
          <button class="mode-btn replace" onclick="submitSigCount('replace')">
            Replace — I got the number wrong
            <span class="sub" id="replaceSub"></span>
          </button>
          <button class="mode-btn back" onclick="goBackToInput()">← Edit number</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const token    = localStorage.getItem('pv_token');
    const userName = localStorage.getItem('pv_full_name');
    const userId   = parseInt(localStorage.getItem('pv_user_id') || '0', 10);

    if (!token) { window.location.href = '/'; }

    document.getElementById('workerName').textContent = userName || 'Canvasser';
    document.getElementById('sigCount').textContent = sessionStorage.getItem('pv_sig_count') ?? '—';

    const HOURLY_GOAL = 10;
    let currentCount   = 0;
    let shiftStartTime = null;
    let shiftEndTime   = null;
    let entryStr       = '';  // keypad input string

    function api(path, opts = {}) {
      return fetch(path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...(opts.headers || {}) },
      }).then(async r => {
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Request failed');
        return d;
      });
    }

    function setMsg(text, type = '') {
      const el = document.getElementById('statusMsg');
      el.textContent = text;
      el.className = 'msg' + (type ? ' ' + type : '');
    }
    function setLocMsg(text, type = '') {
      const el = document.getElementById('locMsg');
      el.textContent = text;
      el.className = 'msg' + (type ? ' ' + type : '');
    }
    function toggleLoc() {
      document.getElementById('locToggle').classList.toggle('open');
      document.getElementById('locInner').classList.toggle('open');
    }

    // ── Keypad ────────────────────────────────────────────────────────────────
    function kp(char) {
      if (char === 'back') {
        entryStr = entryStr.slice(0, -1);
      } else if (char === '.') {
        // ignore decimal for whole-number counts
      } else {
        if (entryStr.length >= 4) return; // max 9999
        entryStr += char;
      }
      refreshKeypadDisplay();
    }

    function quickAdd(n) {
      const cur = parseInt(entryStr || '0', 10);
      entryStr = String(Math.min(cur + n, 9999));
      refreshKeypadDisplay();
    }

    function refreshKeypadDisplay() {
      const el = document.getElementById('entryDisplay');
      const val = entryStr || '0';
      el.textContent = parseInt(val, 10).toLocaleString();
      el.classList.toggle('empty', !entryStr);

      // Update "still needed"
      const entryVal = parseInt(entryStr || '0', 10);
      document.getElementById('statNeeded').textContent = Math.max(0, HOURLY_GOAL - entryVal);
    }

    function updateModalContext() {
      document.getElementById('statSoFar').textContent = currentCount > 0 ? currentCount : '—';

      if (!shiftStartTime) {
        document.getElementById('paceText').textContent = 'Not clocked in';
        document.getElementById('paceBadge').className = 'pace-badge none';
        document.getElementById('paceBadge').textContent = 'No shift';
        document.getElementById('paceSubLeft').textContent = '';
        document.getElementById('paceSubRight').textContent = '';
        return;
      }

      const hrs  = (Date.now() - shiftStartTime.getTime()) / 3600000;
      const pace = hrs >= 0.05 && currentCount > 0 ? currentCount / hrs : 0;
      const isOn = pace >= HOURLY_GOAL;
      const minsLeft = 60 - new Date().getMinutes();

      document.getElementById('paceText').textContent =
        hrs >= 0.05 ? `Pace · ${pace.toFixed(1)} / ${HOURLY_GOAL} per hr` : 'Shift started — keep going!';

      const badge = document.getElementById('paceBadge');
      badge.className = 'pace-badge ' + (hrs < 0.05 ? 'none' : isOn ? 'on' : 'behind');
      badge.textContent = hrs < 0.05 ? 'Just clocked in' : isOn ? 'On pace' : 'Behind pace';

      document.getElementById('paceSubLeft').textContent =
        currentCount > 0 ? `${currentCount} total so far` : '0 so far';
      document.getElementById('paceSubRight').textContent = `${minsLeft}m left this hour`;
    }

    // ── Sheet open/close ──────────────────────────────────────────────────────
    function openSigSheet() {
      entryStr = '';
      refreshKeypadDisplay();
      updateModalContext();
      document.getElementById('inputStep').classList.remove('hidden');
      document.getElementById('modeStep').classList.remove('active');
      document.getElementById('sigOverlay').classList.add('open');
    }

    function closeSheet() {
      document.getElementById('sigOverlay').classList.remove('open');
    }

    function goToModeStep() {
      const val = parseInt(entryStr || '0', 10);
      if (val <= 0) { setMsg('Enter at least 1 signature', 'error'); return; }
      if (currentCount <= 0) { submitSigCount('replace'); return; }

      const newTotal = currentCount + val;
      document.getElementById('modeInfo').innerHTML =
        `You entered <strong>${val}</strong>. Your current total is <strong>${currentCount}</strong>.`;
      document.getElementById('addSub').textContent = `${currentCount} + ${val} = ${newTotal} total`;
      document.getElementById('replaceSub').textContent = `New total: ${val}`;

      document.getElementById('inputStep').classList.add('hidden');
      document.getElementById('modeStep').classList.add('active');
    }

    function goBackToInput() {
      document.getElementById('modeStep').classList.remove('active');
      document.getElementById('inputStep').classList.remove('hidden');
    }

    async function submitSigCount(mode) {
      const val = parseInt(entryStr || '0', 10);
      if (val <= 0) { closeSheet(); return; }
      const finalCount = mode === 'add' ? currentCount + val : val;

      document.getElementById('sigSubmitBtn').disabled = true;
      document.querySelectorAll('.mode-btn').forEach(b => b.disabled = true);

      try {
        await api('/stats/sig-count', { method: 'POST', body: JSON.stringify({ count: finalCount }) });
        currentCount = finalCount;
        sessionStorage.setItem('pv_sig_count', finalCount);
        document.getElementById('sigCount').textContent = finalCount;
        document.getElementById('sigBtnTitle').textContent = 'Update Sig Count';
        closeSheet();
        setMsg('Sig count updated!', 'success');
        updatePaceDisplay();
        loadLeaderboard();
      } catch(e) {
        setMsg(e.message, 'error');
        closeSheet();
      }
      document.getElementById('sigSubmitBtn').disabled = false;
      document.querySelectorAll('.mode-btn').forEach(b => b.disabled = false);
    }

    // ── Location ──────────────────────────────────────────────────────────────
    async function clearPin() {
      const btn = document.getElementById('clearPinBtn');
      btn.disabled = true;
      try {
        await api('/stats/location', { method: 'DELETE' });
        setLocMsg('Pin removed!', 'success');
      } catch(e) { setLocMsg(e.message, 'error'); }
      btn.disabled = false;
    }

    async function shareLocation() {
      if (!navigator.geolocation) { setLocMsg('Geolocation not supported', 'error'); return; }
      const btn = document.getElementById('locBtn');
      btn.disabled = true;
      setLocMsg('Getting location…');
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          try {
            await api('/stats/location', { method: 'POST', body: JSON.stringify({ lat: pos.coords.latitude, lng: pos.coords.longitude }) });
            setLocMsg('Location shared!', 'success');
          } catch(e) { setLocMsg(e.message, 'error'); }
          btn.disabled = false;
        },
        (err) => {
          setLocMsg(err.code === 1 ? 'Location access denied' : 'Could not get location', 'error');
          btn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    // ── Pace display (header) ─────────────────────────────────────────────────
    function updatePaceDisplay() {
      const el = document.getElementById('paceInfo');
      if (!el) return;
      if (!shiftStartTime || currentCount <= 0) { el.innerHTML = ''; return; }

      const hoursElapsed = (Date.now() - shiftStartTime.getTime()) / 3600000;
      if (hoursElapsed < 0.05) { el.innerHTML = ''; return; }

      const pace  = currentCount / hoursElapsed;
      const pct   = Math.min((pace / HOURLY_GOAL) * 100, 100);
      const color = pace >= HOURLY_GOAL      ? '#30d158'
                  : pace >= HOURLY_GOAL * 0.7 ? '#ff9f0a'
                  :                             '#ff3b30';
      const label = pace >= HOURLY_GOAL ? '✓ On pace' : 'Behind pace';

      const projLabel = shiftEndTime
        ? (() => {
            const totalHrs  = (shiftEndTime.getTime() - shiftStartTime.getTime()) / 3600000;
            return `Proj. ${Math.round(pace * totalHrs)} total`;
          })()
        : `${hoursElapsed.toFixed(1)} hrs on shift`;

      const minsLeft = 60 - new Date().getMinutes();

      el.innerHTML = `
        <div class="pace-bar-wrap">
          <div class="pace-bar-meta">
            <span class="pace-label" style="color:${color}">${label} · ${pace.toFixed(1)}/hr</span>
            <span>Goal: ${HOURLY_GOAL}/hr</span>
          </div>
          <div class="pace-bar-track">
            <div class="pace-bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          <div class="pace-sub">
            <span>${projLabel}</span>
            <span>${minsLeft}m left this hour</span>
          </div>
        </div>`;
    }

    // ── Leaderboard ───────────────────────────────────────────────────────────
    async function loadLeaderboard() {
      try {
        const data = await api('/stats/live');
        const el   = document.getElementById('lbList');
        const sorted = [...data].filter(e => e.sig_count > 0).sort((a, b) => b.sig_count - a.sig_count);
        if (!sorted.length) { el.innerHTML = '<div class="lb-empty">No counts yet — be first!</div>'; return; }
        const myName = (userName || '').toLowerCase();
        el.innerHTML = sorted.map((e, i) => {
          const isMe  = e.full_name.toLowerCase() === myName;
          const rank  = i + 1;
          const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
          return `<div class="lb-row${isMe ? ' me' : ''}">
            <div class="lb-rank${rank <= 3 ? ' top' : ''}">${medal}</div>
            <div class="lb-name">${e.full_name}${isMe ? '<span class="you-tag">you</span>' : ''}</div>
            <div class="lb-sigs">${e.sig_count.toLocaleString()}</div>
          </div>`;
        }).join('');
        document.getElementById('lbUpdated').textContent =
          new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      } catch(e) {
        document.getElementById('lbList').innerHTML = '<div class="lb-empty">Could not load</div>';
      }
    }

    // ── Team leaderboard ──────────────────────────────────────────────────────
    async function loadTeamLeaderboard() {
      try {
        const teams = await api('/teams/leaderboard');
        const card  = document.getElementById('teamCard');
        const el    = document.getElementById('teamList');
        if (!teams.length) { card.style.display = 'none'; return; }
        card.style.display = '';
        el.innerHTML = teams.map((t, i) => {
          const rank  = i + 1;
          const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
          const isMyTeam = t.members.some(m => m.id === userId);
          return `<div class="lb-row${isMyTeam ? ' me' : ''}">
            <div class="team-rank${rank <= 3 ? ' top' : ''}">${medal}</div>
            <div class="team-info">
              <div class="team-name-row">${t.name}${isMyTeam ? '<span class="my-tag">your team</span>' : ''}</div>
              <div class="team-mgr">${t.manager_name ? 'Led by ' + t.manager_name : ''} · ${t.member_count} member${t.member_count !== 1 ? 's' : ''}</div>
            </div>
            <div class="team-sigs">${t.total_sigs.toLocaleString()}</div>
          </div>`;
        }).join('');
        document.getElementById('teamUpdated').textContent =
          new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      } catch(e) { /* silently hide if no teams */ }
    }

    function logout() { localStorage.clear(); sessionStorage.clear(); window.location.href = '/'; }

    document.getElementById('sigOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeSheet();
    });

    async function initMyCount() {
      try {
        const data = await api('/stats/my-count');
        if (data.sig_count > 0) {
          currentCount = data.sig_count;
          sessionStorage.setItem('pv_sig_count', data.sig_count);
          document.getElementById('sigCount').textContent = data.sig_count;
          document.getElementById('sigBtnTitle').textContent = 'Update Sig Count';
        }
      } catch(e) {}
    }

    async function initMyShift() {
      try {
        const data = await api(`/shifts/active/${userId}`);
        if (data.active && data.shift) {
          const rawIn = data.shift.clock_in;
          shiftStartTime = new Date(rawIn.includes('Z') ? rawIn : rawIn + 'Z');
          if (data.shift.clock_out) {
            const rawOut = data.shift.clock_out;
            shiftEndTime = new Date(rawOut.includes('Z') ? rawOut : rawOut + 'Z');
          }
        }
      } catch(e) {}
      updatePaceDisplay();
    }

    initMyCount();
    initMyShift();
    loadLeaderboard();
    loadTeamLeaderboard();
    setInterval(loadLeaderboard, 30000);
    setInterval(loadTeamLeaderboard, 60000);
    setInterval(updatePaceDisplay, 60000);
  </script>
</body>
</html>
