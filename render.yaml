services:
  - type: web
    name: petition-verifier
    runtime: python
    buildCommand: "pip install -r requirements-deploy.txt"
    startCommand: "PYTHONPATH=src uvicorn petition_verifier.api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONPATH
        value: src
