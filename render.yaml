services:
  - type: web
    name: petition-verifier
    runtime: python
    buildCommand: "apt-get install -y tesseract-ocr poppler-utils && pip install -r requirements-deploy.txt && cd web && npm ci && npm run build"
    startCommand: "PYTHONPATH=src alembic upgrade head && PYTHONPATH=src uvicorn petition_verifier.api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONPATH
        value: src
